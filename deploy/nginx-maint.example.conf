# maint.thenetworkerhub.com — example nginx vhost
#
# Problem: if /static/ points at the main site's app/static/, maint-only files
# (admin_console.css) return 404 even though the maint app deploy succeeded.
#
# Fix: alias /static/ to the maint app tree (or proxy all traffic to gunicorn).

server {
    listen 443 ssl http2;
    server_name maint.thenetworkerhub.com;

    # ssl_certificate ...;
    # ssl_certificate_key ...;

    location /static/ {
        alias /home/ubuntu/PythonRoot/maint/app/static/;
        expires 7d;
        add_header Cache-Control "public";
    }

    location / {
        proxy_pass http://127.0.0.1:8104;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
