# maint.thenetworkerhub.com — example nginx vhost
#
# Static layout on the VPS:
#   maint/app/static/css/          — maint-only assets (admin_console.css, etc.)
#   maint/app/static/js/
#   maint/app/static/images/       — logos, favicons shipped with the app
#   maint/app/static/meeting_group_images/  — uploads (often symlinked, see below)
#   maint/app/static/event_images/
#   maint/app/static/user_images/
#
# Common mistake: pointing nginx /static/ at the *main* site's static tree (or only
# at its upload folders) so shared images work but maint CSS/JS 404. Use maint's
# static root as the alias; symlink upload dirs to the main site if both apps
# must share the same files on disk.

server {
    listen 443 ssl http2;
    server_name maint.thenetworkerhub.com;

    # ssl_certificate ...;
    # ssl_certificate_key ...;

    # All /static/* — code assets AND uploads under one maint tree
    location /static/ {
        alias /home/ubuntu/PythonRoot/maint/app/static/;
        expires 7d;
        add_header Cache-Control "public";
    }

    location / {
        proxy_pass http://127.0.0.1:8104;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# --- Shared uploads (one-time on VPS, optional) ---
# If the public site and maint app must use the same image files:
#
#   MAIN=/home/ubuntu/PythonRoot/TheNetworkerDev/app/static
#   MAINT=/home/ubuntu/PythonRoot/maint/app/static
#   for d in meeting_group_images event_images user_images; do
#     rm -rf "$MAINT/$d"
#     ln -s "$MAIN/$d" "$MAINT/$d"
#   done
#
# nginx still aliases /static/ to $MAINT — symlinks resolve to the main upload dirs.
# Do NOT point nginx only at $MAIN/meeting_group_images; that skips maint CSS/JS.
