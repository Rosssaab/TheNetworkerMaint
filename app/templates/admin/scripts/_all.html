            '<span class="small ms-md-auto" id="adminKwSugSelCount" aria-live="polite">0 selected</span>' +
            "</div></div>" +
            '<div class="d-flex flex-wrap align-items-center gap-2 mt-3 pt-3 border-top border-secondary border-opacity-25">' +
            '<button type="button" class="btn btn-sm btn-primary" id="adminKwSuggestCopySelected" disabled>Copy selected to clipboard</button>' +
            '<button type="button" class="btn btn-sm btn-success" id="adminKwSuggestApplySelected" disabled>Apply selected to database</button>' +
            '<a class="btn btn-sm btn-outline-primary" href="' +
            escapeAttr(KW_MAINT_URL) +
            '" target="_blank" rel="noopener">Open keyword maintenance</a>' +
            '<span class="small admin-console-footer-note ms-md-auto w-100 w-md-auto mt-1 mt-md-0">Use Apply to save checked rows, or copy and edit in keyword maintenance.</span>' +
            "</div>";
        }
        html +=
          '<p class="small admin-console-footer-note mt-3 mb-0">Adds create new keywords under the given topic. Group links attach <strong>existing</strong> keywords to an event group (topic must match). Removes delete keywords only when nothing still references them.</p>';
        suggestBody.innerHTML = html;
        ensureKwSuggestDelegation();
        updateKwSuggestCount(suggestBody);
      }

      if (suggestBtn && suggestModalEl && suggestBody && window.bootstrap && window.bootstrap.Modal) {
        ensureKwSuggestDelegation();
        var kwSuggestModal = window.bootstrap.Modal.getOrCreateInstance(suggestModalEl);
        suggestBtn.addEventListener("click", function () {
          suggestBody.setAttribute("aria-busy", "true");
          suggestBody.innerHTML =
            '<div class="text-center py-4 px-2">' +
            '<div class="spinner-border text-primary mb-3" role="status" style="width: 2.75rem; height: 2.75rem;" aria-hidden="true"></div>' +
            '<p class="visually-hidden">Loading keyword suggestions</p>' +
            '<p class="fw-semibold mb-1">Working on suggestions…</p>' +
            '<p class="small admin-console-footer-note mb-3">This usually takes 30–90 seconds. The server is reading event groups, existing tags, and calling the AI.</p>' +
            '<ul class="list-unstyled small admin-console-footer-note text-start mx-auto mb-0" style="max-width: 26rem;">' +
            '<li class="mb-2"><span class="me-1 opacity-75">1.</span>Build corpus from meeting group names and descriptions</li>' +
            '<li class="mb-2"><span class="me-1 opacity-75">2.</span>Load tags and topics for the model</li>' +
            '<li class="mb-2"><span class="me-1 opacity-75">3.</span>Call Gemini and parse JSON</li>' +
            '<li class="mb-0"><span class="me-1 opacity-75">4.</span>Validate new tags, group↔keyword links, and removals</li>' +
            "</ul></div>";
          kwSuggestModal.show();
          suggestBtn.disabled = true;
          if (suggestSpin) suggestSpin.classList.remove("d-none");
          fetch(KW_SUGGEST_URL, {
            method: "POST",
            credentials: "same-origin",
            headers: {
              Accept: "application/json",
              "Content-Type": "application/json",
            },
            body: "{}",
          })
            .then(function (r) {
              return r.text().then(function (t) {
                var j = {};
                try {
                  j = t ? JSON.parse(t) : {};
                } catch (e) {}
                return { ok: r.ok, j: j };
              });
            })
            .then(function (pack) {
              var j = pack.j || {};
              if (!pack.ok || !j.ok) {
                var err = (j && j.error) || "Could not get suggestions.";
                kwSuggestModal.hide();
                adminKeywordSuggestMsg("Keyword suggestions", err);
                return;
              }
              renderSuggestBody(j);
            })
            .catch(function () {
              kwSuggestModal.hide();
              adminKeywordSuggestMsg(
                "Keyword suggestions",
                "The request failed. Check your connection and try again."
              );
            })
            .finally(function () {
              suggestBody.setAttribute("aria-busy", "false");
              suggestBtn.disabled = false;
              if (suggestSpin) suggestSpin.classList.add("d-none");
            });
        });
      }

      var kwApplyConfirmEl = document.getElementById("adminKwSuggestApplyConfirmModal");
      var kwApplyConfirmBtnEl = document.getElementById("adminKwSuggestApplyConfirmBtn");
      if (kwApplyConfirmBtnEl && kwApplyConfirmEl && window.bootstrap && window.bootstrap.Modal) {
        kwApplyConfirmBtnEl.addEventListener("click", function () {
          var payload = pendingKwApplyPayload;
          if (!payload) return;
          kwApplyConfirmBtnEl.disabled = true;
          fetch(KW_APPLY_URL, {
            method: "POST",
            credentials: "same-origin",
            headers: {
              Accept: "application/json",
              "Content-Type": "application/json",
            },
            body: JSON.stringify(payload),
          })
            .then(function (r) {
              return r.text().then(function (t) {
                var j = {};
                try {
                  j = t ? JSON.parse(t) : {};
                } catch (e) {}
                return { ok: r.ok, j: j };
              });
            })
            .then(function (pack) {
              var j = pack.j || {};
              window.bootstrap.Modal.getOrCreateInstance(kwApplyConfirmEl).hide();
              if (!pack.ok || !j.ok) {
                var err = (j && j.error) || "Could not apply suggestions.";
                adminKeywordSuggestMsg("Apply keyword changes", err);
                return;
              }
              var msg =
                "Added " +
                String(j.added != null ? j.added : 0) +
                " keyword(s); linked " +
                String(j.linked != null ? j.linked : 0) +
                " to event groups; removed " +
                String(j.removed != null ? j.removed : 0) +
                ".";
              if (j.notes) msg += " " + j.notes;
              var sm = document.getElementById("adminKwSuggestModal");
              if (sm && window.bootstrap && window.bootstrap.Modal) {
                window.bootstrap.Modal.getOrCreateInstance(sm).hide();
              }
              if (window.showTnwMessage) {
                window.showTnwMessage(msg, { title: "Keywords updated" });
              }
              window.setTimeout(function () {
                window.location.reload();
              }, 400);
            })
            .catch(function () {
              window.bootstrap.Modal.getOrCreateInstance(kwApplyConfirmEl).hide();
              adminKeywordSuggestMsg(
                "Apply keyword changes",
                "The request failed. Check your connection and try again."
              );
            })
            .finally(function () {
              kwApplyConfirmBtnEl.disabled = false;
              pendingKwApplyPayload = null;
            });
        });
      }
    })();
  </script>
  <script>
    (function () {
      var panel = document.getElementById("adminPanelTestEvents");
      if (!panel) return;

      function teShowBusy(text) {
        var o = document.getElementById("adminTeBusyOverlay");
        var t = document.getElementById("adminTeBusyOverlayText");
        if (t) t.textContent = text || "Working…";
        if (o) {
          o.classList.remove("d-none");
          o.classList.add("d-flex");
          o.setAttribute("aria-hidden", "false");
        }
      }
      function teHideBusy() {
        var o = document.getElementById("adminTeBusyOverlay");
        if (o) {
          o.classList.add("d-none");
          o.classList.remove("d-flex");
          o.setAttribute("aria-hidden", "true");
        }
      }

      function teTestEventsPanelLive() {
        return (
          panel.classList.contains("show") &&
          panel.classList.contains("active") &&
          !!document.getElementById("adminTestEventsForm")
        );
      }

      function teApplyStagedGroupImage(j) {
        var hid = document.getElementById("teStagedImageFilename");
        if (hid && j.image_filename) hid.value = j.image_filename;
        var wrap = document.getElementById("adminTeImagePreviewWrap");
        var prev = document.getElementById("adminTeImagePreview");
        if (wrap && prev && j.image_url) {
          prev.src = j.image_url;
          wrap.classList.remove("d-none");
        }
      }

      function teStageGroupImageFile(file) {
        var stageUrl = panel.getAttribute("data-stage-group-image-url");
        if (!stageUrl) {
          teStub("Image staging URL is missing.");
          return;
        }
        if (!file) return;
        if (!file.type || file.type.indexOf("image/") !== 0) {
          teStub("That item is not an image. Copy a screenshot or image, then paste again.");
          return;
        }
        var fd = new FormData();
        fd.append("image", file, file.name || "image.png");
        return fetch(stageUrl, {
          method: "POST",
          body: fd,
          credentials: "same-origin",
        })
          .then(function (r) {
            return r.json().then(function (j) {
              return { ok: r.ok, j: j };
            });
          })
          .then(function (res) {
            if (!res.j || !res.j.ok) {
              teStub((res.j && res.j.error) || "Could not save the image.");
              return;
            }
            teApplyStagedGroupImage(res.j);
          })
          .catch(function () {
            teStub("Image upload failed. Check your connection and try again.");
          });
      }

      window.addEventListener(
        "paste",
        function (e) {
          if (!teTestEventsPanelLive()) return;
          var cd = e.clipboardData;
          if (!cd || !cd.items) return;
          var i, item, blob;
          for (i = 0; i < cd.items.length; i++) {
            item = cd.items[i];
            if (item.kind === "file" && item.type && item.type.indexOf("image/") === 0) {
              blob = item.getAsFile();
              if (blob) {
                e.preventDefault();
                teOpenGroupImageCrop(
                  new File([blob], "pasted.png", { type: blob.type || "image/png" })
                );
              }
              break;
            }
          }
        },
        true
      );

      function teOpenGroupImageCrop(file) {
        if (!file) return;
        if (typeof window.tnwOpenSquareImageCrop === "function") {
          window.tnwOpenSquareImageCrop(file, {
            dialogTitle: "Crop group image",
            messageTitle: "Test events",
            defaultFileNameBase: "group-image",
            onCroppedFile: teStageGroupImageFile,
          });
          return;
        }
        teStageGroupImageFile(file);
      }

      var teGroupImageInput = document.getElementById("teGroupImage");
      if (teGroupImageInput) {
        if (window.tnwWireFileInputToSquareCrop) {
          window.tnwWireFileInputToSquareCrop(teGroupImageInput, {
            dialogTitle: "Crop group image",
            messageTitle: "Test events",
            defaultFileNameBase: "group-image",
            onCroppedFile: teStageGroupImageFile,
          });
        } else {
          teGroupImageInput.addEventListener("change", function () {
            if (teGroupImageInput.files && teGroupImageInput.files[0]) {
              teStageGroupImageFile(teGroupImageInput.files[0]);
            }
          });
        }
      }

      function teUpdateF2fNote() {
        var sel = document.getElementById("teUserId");
        var note = document.getElementById("adminTeF2fLocationNote");
        if (!note) return;
        var opt = sel && sel.selectedIndex >= 0 ? sel.options[sel.selectedIndex] : null;
        if (!opt || !opt.value) {
          note.textContent =
            "F2F: uses user map coordinates; placeholder postcode B1 1AA for venue checks.";
          return;
        }
        var lat = (opt.getAttribute("data-lat") || "").trim();
        var lon = (opt.getAttribute("data-lon") || "").trim();
        if (lat && lon) {
          note.textContent =
            "Face-to-face meetings will use this user’s saved coordinates: latitude " +
            lat +
            ", longitude " +
            lon +
            " (same as their profile map pin).";
        } else {
          note.textContent =
            "This user has no latitude/longitude on file. Add a map location on their profile before generating F2F test meetings, or choose Virtual.";
        }
      }

      function teParseGroupCountFromOption(opt) {
        var raw = opt.getAttribute("data-group-count");
        if (raw !== null && raw !== "") {
          var n = parseInt(raw, 10);
          return isNaN(n) ? 0 : n;
        }
        var t = opt.textContent || "";
        var m = /\s—\s*(\d+)\s+test group/i.exec(t);
        if (m) return parseInt(m[1], 10);
        if (/no groups yet/i.test(t)) return 0;
        return 0;
      }

      function teSelectFirstTestUserWithoutGroups() {
        var sel = document.getElementById("teUserId");
        if (!sel || sel.disabled) return;
        for (var i = 0; i < sel.options.length; i++) {
          var opt = sel.options[i];
          if (!opt.value) continue;
          if (teParseGroupCountFromOption(opt) === 0) {
            sel.selectedIndex = i;
            return;
          }
        }
      }

      function teSelectSuggestedTestUser(userId) {
        var sel = document.getElementById("teUserId");
        if (!sel || sel.disabled) return;
        var n = parseInt(userId, 10);
        if (!isNaN(n) && n > 0) {
          var s = String(n);
          sel.value = s;
          if (sel.value === s) return;
        }
        teSelectFirstTestUserWithoutGroups();
      }

      function teToggleFormat() {
        var virt = document.getElementById("adminTeVirtualFields");
        var v = document.getElementById("teFmtVirtual");
        var f2fNote = document.getElementById("adminTeF2fLocationNote");
        if (!virt) return;
        if (v && v.checked) {
          virt.classList.remove("d-none");
          if (f2fNote) f2fNote.classList.add("d-none");
        } else {
          virt.classList.add("d-none");
          if (f2fNote) f2fNote.classList.remove("d-none");
        }
        teEnsureVirtualMeetingDefaults();
      }

      function teVirtualLinkLooksValid(s) {
        var t = (s || "").trim();
        if (t.length < 12) return false;
        try {
          var u = new URL(t);
          return (u.protocol === "http:" || u.protocol === "https:") && !!u.host;
        } catch (err) {
          return false;
        }
      }

      /** When Virtual is selected, ensure platform and a real https URL so Create and AI flows do not stall on empty placeholders. */
      function teEnsureVirtualMeetingDefaults() {
        var v = document.getElementById("teFmtVirtual");
        var vp = document.getElementById("teVirtualPlatform");
        var vl = document.getElementById("teVirtualLink");
        if (!v || !v.checked || !vp || !vl) return;
        if (!(vp.value || "").trim()) vp.value = "Zoom";
        if (!teVirtualLinkLooksValid(vl.value)) vl.value = "https://zoom.us/j/00000000000";
      }

      var selUser = document.getElementById("teUserId");
      if (selUser) selUser.addEventListener("change", teUpdateF2fNote);
      document.querySelectorAll('input[name="te_meeting_format"]').forEach(function (r) {
        r.addEventListener("change", teToggleFormat);
      });
      if (selUser && panel && !selUser.disabled) {
        var defId = (panel.getAttribute("data-default-te-user-id") || "").trim();
        if (defId) {
          selUser.value = defId;
          if (selUser.value !== defId) {
            teSelectFirstTestUserWithoutGroups();
          }
        }
      }
      teUpdateF2fNote();
      teToggleFormat();

      function teStub(msg) {
        if (window.showTnwMessage) window.showTnwMessage(msg, { title: "Test events" });
      }

      function teRandomGbpPrice() {
        return (Math.random() * 20).toFixed(2);
      }

      function teFetchSuggestFromDescription(opts) {
        opts = opts || {};
        var classificationOnly = !!opts.classificationOnly;
        var url = panel.getAttribute("data-suggest-url");
        var gd = document.getElementById("teGroupDescription");
        var ti = document.getElementById("teIndustryId");
        var kw = document.getElementById("teKeywords");
        return new Promise(function (resolve) {
          if (!url || !gd) {
            resolve();
            return;
          }
          var desc = (gd.value || "").trim();
          if (desc.length < 40) {
            resolve();
            return;
          }
          var body = { description: desc };
          if (!classificationOnly && ti && ti.value) {
            var n = parseInt(ti.value, 10);
            if (!isNaN(n)) body.industry_id = n;
          }
          fetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/json", Accept: "application/json" },
            credentials: "same-origin",
            body: JSON.stringify(body),
          })
            .then(function (r) {
              return r.json().then(function (j) {
                return { ok: r.ok, j: j };
              });
            })
            .then(function (res) {
              if (res.j && res.j.ok && !res.j.skipped) {
                if (res.j.industry_id != null && ti) ti.value = String(res.j.industry_id);
                if (res.j.keywords_csv != null && kw) kw.value = res.j.keywords_csv;
              }
              resolve();
            })
            .catch(function () {
              resolve();
            });
        });
      }

      function teBusyActive() {
        var o = document.getElementById("adminTeBusyOverlay");
        return !!(o && !o.classList.contains("d-none"));
      }

      function teApplyPostAiDefaults() {
        var defDate = panel.getAttribute("data-default-first-date") || "";
        var ec = document.getElementById("teEventCount");
        var fd = document.getElementById("teFirstDate");
        var tp = document.getElementById("teTicketPrice");
        var tq = document.getElementById("teTicketMaxQty");
        if (ec) ec.value = "3";
        if (fd && defDate) fd.value = defDate;
        if (tp) tp.value = teRandomGbpPrice();
        if (tq) tq.value = "50";
        teToggleFormat();
        teUpdateF2fNote();
      }

      function teFillApproveModal(j) {
        var body = document.getElementById("adminTeAiApproveBody");
        if (!body) return;
        while (body.firstChild) body.removeChild(body.firstChild);
        var gn = document.getElementById("teGroupName");
        var gd = document.getElementById("teGroupDescription");
        var ti = document.getElementById("teIndustryId");
        var kw = document.getElementById("teKeywords");
        var topicLabel = "";
        if (ti && ti.selectedIndex >= 0) {
          topicLabel = (ti.options[ti.selectedIndex].text || "").trim();
        }
        function mkP(cls, text) {
          var p = document.createElement("p");
          p.className = cls || "mb-2";
          p.textContent = text;
          return p;
        }
        body.appendChild(mkP("mb-1 fw-semibold", gn && gn.value ? gn.value : "Untitled"));
        if (topicLabel) body.appendChild(mkP("small text-secondary mb-2", "Topic: " + topicLabel));
        var d = gd && gd.value ? gd.value.trim() : "";
        if (d.length > 420) d = d.slice(0, 417) + "…";
        body.appendChild(mkP("small mb-2", d || "(no description)"));
        var k = kw && kw.value ? kw.value.trim() : "";
        if (k) body.appendChild(mkP("small mb-0", "Keywords: " + k));
        if (j && j.image_url) {
          var iw = document.createElement("div");
          iw.className = "mt-2";
          var im = document.createElement("img");
          im.src = j.image_url;
          im.className = "img-thumbnail bg-light";
          im.alt = "";
          im.width = 160;
          im.height = 90;
          im.style.width = "160px";
          im.style.height = "90px";
          im.style.objectFit = "contain";
          iw.appendChild(im);
          body.appendChild(iw);
        } else {
          body.appendChild(
            mkP(
              "small text-secondary mb-0",
              "No auto-generated banner — after you close this dialog, paste (Ctrl+V) or choose a file under Group image, then create."
            )
          );
        }
      }

      var teSuggestTimer = null;
      var teSuggestInFlight = false;

      function teRunSuggestFromDescription() {
        if (teBusyActive() || teSuggestInFlight) return;
        teSuggestInFlight = true;
        teFetchSuggestFromDescription({ classificationOnly: false })
          .catch(function () {})
          .finally(function () {
            teSuggestInFlight = false;
          });
      }

      function teScheduleSuggestFromDescription() {
        if (teSuggestTimer) window.clearTimeout(teSuggestTimer);
        teSuggestTimer = window.setTimeout(function () {
          teSuggestTimer = null;
          teRunSuggestFromDescription();
        }, 700);
      }

      var gdEl = document.getElementById("teGroupDescription");
      if (gdEl) {
        gdEl.addEventListener("input", teScheduleSuggestFromDescription);
        gdEl.addEventListener("blur", function () {
          if (teSuggestTimer) window.clearTimeout(teSuggestTimer);
          teSuggestTimer = null;
          teRunSuggestFromDescription();
        });
      }

      var teAiApproveModalEl = document.getElementById("adminTeAiApproveModal");
      var teAiApproveBtn = document.getElementById("adminTeAiApproveConfirmBtn");
      if (teAiApproveModalEl && teAiApproveBtn) {
        teAiApproveBtn.addEventListener("click", function () {
          teApplyPostAiDefaults();
          if (window.bootstrap && window.bootstrap.Modal) {
            window.bootstrap.Modal.getOrCreateInstance(teAiApproveModalEl).hide();
          }
          teFetchSuggestFromDescription({ classificationOnly: true }).then(function () {
            if (window.showTnwMessage) {
                window.showTnwMessage(
                "Topic and keywords were aligned to the description. GBP price set to a random value between 0 and 20. " +
                  "For Virtual events, platform and meeting link are filled with test defaults if they were blank. " +
                  "Paste or choose a group banner image, then click Create this test event.",
                { title: "Suggestions applied", variant: "success" }
              );
            }
          });
        });
      }

      function teCollectPayload() {
        var gn = document.getElementById("teGroupName");
        var gd = document.getElementById("teGroupDescription");
        var ti = document.getElementById("teIndustryId");
        var uid = document.getElementById("teUserId");
        var ec = document.getElementById("teEventCount");
        var fd = document.getElementById("teFirstDate");
        var fmt = document.querySelector('input[name="te_meeting_format"]:checked');
        var kw = document.getElementById("teKeywords");
        var hid = document.getElementById("teStagedImageFilename");
        var du = document.getElementById("teDuration");
        var tn = document.getElementById("teTicketName");
        var tp = document.getElementById("teTicketPrice");
        var tq = document.getElementById("teTicketMaxQty");
        var vp = document.getElementById("teVirtualPlatform");
        var vl = document.getElementById("teVirtualLink");
        return {
          te_user_id: uid && uid.value ? parseInt(uid.value, 10) : null,
          te_industry_id: ti && ti.value ? parseInt(ti.value, 10) : null,
          te_group_name: gn ? gn.value.trim() : "",
          te_group_description: gd ? gd.value.trim() : "",
          te_keywords: kw ? kw.value.trim() : "",
          te_staged_image_filename: hid ? hid.value.trim() : "",
          te_event_count: ec ? parseInt(ec.value, 10) : 1,
          te_first_event_date: fd ? fd.value : "",
          te_meeting_format: fmt ? fmt.value : "Face2Face",
          te_duration_minutes: du ? parseInt(du.value, 10) || 60 : 60,
          te_ticket_name: tn ? tn.value.trim() : "General admission",
          te_ticket_price: tp ? tp.value : "0",
          te_ticket_max_qty: tq ? parseInt(tq.value, 10) : 50,
          te_virtual_platform: vp ? vp.value.trim() : "",
          te_virtual_link: vl ? vl.value.trim() : "",
        };
      }

      var aiBtn = document.getElementById("adminTestEventsAiBtn");
      var teAiRegenerateBtn = document.getElementById("adminTeAiRegenerateBtn");

      function teRunAiPrepare(opts) {
        opts = opts || {};
        var regenerate = !!opts.regenerate;
        var url = panel.getAttribute("data-ai-prepare-url");
        if (!url) {
          teStub("AI endpoint URL is missing.");
          return;
        }
        var gn = document.getElementById("teGroupName");
        var gd = document.getElementById("teGroupDescription");
        var ti = document.getElementById("teIndustryId");
        var fmt = document.querySelector('input[name="te_meeting_format"]:checked');
        var img = document.getElementById("teGroupImage");
        var fd = new FormData();
        if (gn) fd.append("te_group_name", gn.value || "");
        var desc = (gd && gd.value) ? gd.value : "";
        if (regenerate) {
          desc +=
            "\n\n[Regenerate: discard the previous title and body style entirely. New group_name and description must not "
            "reuse the same opening, metaphor, or sentence skeleton as the last draft. Change tone (formal vs warm), "
            "emphasis (format vs outcomes vs people), and at least three distinctive phrases. Stay truthful and on-topic.]";
        }
        fd.append("te_group_description", desc);
        if (ti) fd.append("te_industry_id", ti.value || "");
        if (fmt) fd.append("te_meeting_format", fmt.value || "Face2Face");
        fd.append("te_skip_image", "1");
        if (img && img.files && img.files[0]) fd.append("image", img.files[0]);
        var hidStaged = document.getElementById("teStagedImageFilename");
        if (hidStaged && (hidStaged.value || "").trim()) {
          fd.append("te_staged_image_filename", hidStaged.value.trim());
        }
        var spin = aiBtn ? aiBtn.querySelector(".admin-te-ai-spinner") : null;
        if (aiBtn) aiBtn.disabled = true;
        if (teAiRegenerateBtn) teAiRegenerateBtn.disabled = true;
        if (teAiApproveBtn) teAiApproveBtn.disabled = true;
        if (spin) spin.classList.remove("d-none");
        teShowBusy(
          regenerate
            ? "Generating another draft (text only) — see server terminal [test-events] …"
            : "Generating title & description with Gemini (text only) — see server terminal [test-events] …"
        );
        fetch(url, { method: "POST", body: fd, credentials: "same-origin" })
          .then(function (r) {
            return r.json().then(function (j) {
              return { ok: r.ok, status: r.status, j: j };
            });
          })
          .then(function (res) {
            if (!res.j || !res.j.ok) {
              var err = (res.j && res.j.error) || "Request failed (" + res.status + ").";
              teStub(err);
              return;
            }
            var j = res.j;
            if (gn && j.group_name) gn.value = j.group_name;
            if (gd && j.description != null) gd.value = j.description;
            var hid = document.getElementById("teStagedImageFilename");
            var wrap = document.getElementById("adminTeImagePreviewWrap");
            var prev = document.getElementById("adminTeImagePreview");
            if (j.image_filename && j.image_url) {
              if (hid) hid.value = j.image_filename;
              if (wrap && prev) {
                prev.src = j.image_url;
                wrap.classList.remove("d-none");
              }
            } else {
              var hadStaged = hid && (hid.value || "").trim();
              if (!hadStaged) {
                if (hid) hid.value = "";
                if (wrap) wrap.classList.add("d-none");
                if (prev) prev.removeAttribute("src");
              }
            }
            var postHint = document.getElementById("adminTePostAiHint");
            if (postHint) postHint.classList.remove("d-none");
            if (gd) {
              gd.focus();
              try {
                gd.scrollIntoView({ block: "nearest", behavior: "smooth" });
              } catch (err) {}
            }
            teEnsureVirtualMeetingDefaults();
            return teFetchSuggestFromDescription({ classificationOnly: true }).then(function () {
              var ti2 = document.getElementById("teIndustryId");
              var kw2 = document.getElementById("teKeywords");
              if (ti2 && j.industry_id != null && j.industry_id !== "" && (!ti2.value || ti2.value === "")) {
                ti2.value = String(j.industry_id);
              }
              if (kw2 && j.keywords_csv != null && !(kw2.value || "").trim()) {
                kw2.value = j.keywords_csv;
              }
              var tp = document.getElementById("teTicketPrice");
              if (tp) tp.value = teRandomGbpPrice();
              teFillApproveModal(j);
              if (window.bootstrap && window.bootstrap.Modal && teAiApproveModalEl) {
                window.bootstrap.Modal.getOrCreateInstance(teAiApproveModalEl).show();
              } else if (window.showTnwMessage) {
                window.showTnwMessage(
                  "AI filled the form. Use Approve in the modal when available.",
                  { title: "AI done" }
                );
              }
            });
          })
          .catch(function () {
            teStub("The request failed. Check your connection and try again.");
          })
          .finally(function () {
            if (aiBtn) aiBtn.disabled = false;
            if (teAiRegenerateBtn) teAiRegenerateBtn.disabled = false;
            if (teAiApproveBtn) teAiApproveBtn.disabled = false;
            if (spin) spin.classList.add("d-none");
            teHideBusy();
          });
      }

      if (aiBtn) {
        aiBtn.addEventListener("click", function () {
          teRunAiPrepare({ regenerate: false });
        });
      }
      if (teAiRegenerateBtn) {
        teAiRegenerateBtn.addEventListener("click", function () {
          teRunAiPrepare({ regenerate: true });
        });
      }

      function teSetTestUserOptionGroupCount(opt, count) {
        var un = (opt.getAttribute("data-username") || "").trim();
        if (!un) {
          var parts = (opt.textContent || "").split(/\s+—\s+/);
          un = (parts[0] || "").trim();
        }
        opt.setAttribute("data-group-count", String(count));
        if (count > 0) {
          opt.textContent = un + " — " + count + " test group(s)";
        } else {
          opt.textContent = un + " — no groups yet";
        }
      }

      function teBumpTestUserGroupCount(userId) {
        if (userId == null) return;
        var sel = document.getElementById("teUserId");
        if (!sel) return;
        var sid = String(userId);
        for (var i = 0; i < sel.options.length; i++) {
          var opt = sel.options[i];
          if (opt.value === sid) {
            var next = teParseGroupCountFromOption(opt) + 1;
            teSetTestUserOptionGroupCount(opt, next);
            break;
          }
        }
      }

      function teResetTestEventsForm() {
        var form = document.getElementById("adminTestEventsForm");
        if (form) form.reset();
        var hid = document.getElementById("teStagedImageFilename");
        if (hid) hid.value = "";
        var img = document.getElementById("teGroupImage");
        if (img) img.value = "";
        var wrap = document.getElementById("adminTeImagePreviewWrap");
        var prev = document.getElementById("adminTeImagePreview");
        if (wrap) wrap.classList.add("d-none");
        if (prev) {
          prev.removeAttribute("src");
        }
        var postHint = document.getElementById("adminTePostAiHint");
        if (postHint) postHint.classList.add("d-none");
        var f2f = document.getElementById("teFmtF2f");
        var virt = document.getElementById("teFmtVirtual");
        if (f2f) f2f.checked = true;
        if (virt) virt.checked = false;
        teToggleFormat();
        teUpdateF2fNote();
      }

      function teFormatCommittedMessage(j) {
        var lines = [
          "Committed to the database:",
          "• Event group id " + j.meeting_group_id + " — " + (j.group_name || ""),
          "• Owner: " + (j.owner_username || "") + " (user id " + j.owner_user_id + ")",
          "• Format: " +
            (j.meeting_format || "") +
            ", first meeting date " +
            (j.first_event_date || "") +
            ", " +
            (j.meetings_created || 0) +
            " live meeting(s); meeting ids " +
            (Array.isArray(j.meeting_ids) && j.meeting_ids.length ? j.meeting_ids.join(", ") : "—"),
        ];
        if (j.industry_name) {
          lines.push(
            "• Topic: " + j.industry_name + " (industry id " + (j.industry_id != null ? j.industry_id : "—") + ")"
          );
        }
        lines.push(
          "• Tickets: " +
            (j.ticket_name || "General admission") +
            ", GBP " +
            (j.ticket_price != null ? j.ticket_price : "0") +
            ", max " +
            (j.ticket_max_qty != null ? j.ticket_max_qty : "50") +
            " per meeting, Active"
        );
        lines.push("", "The form has been reset. The test user control selects the next account with no test groups when available.");
        return lines.join("\n");
      }

      var createSubmit = document.getElementById("adminTestEventsCreateSubmitBtn");
      if (createSubmit) {
        createSubmit.addEventListener("click", function () {
          var url = panel.getAttribute("data-create-url");
          if (!url) {
            teStub("Create endpoint URL is missing.");
            return;
          }
          var payload = teCollectPayload();
          if (!payload.te_user_id) {
            teStub("Choose a test user.");
            return;
          }
          if (!payload.te_industry_id) {
            teStub("Choose a topic (industry).");
            return;
          }
          if (!payload.te_group_name) {
            teStub("Enter a group name.");
            return;
          }
          if (!payload.te_group_description) {
            teStub("Enter a description.");
            return;
          }
          if (!payload.te_first_event_date) {
            teStub("Choose the first event date.");
            return;
          }
          teEnsureVirtualMeetingDefaults();
          payload = teCollectPayload();
          if (payload.te_meeting_format === "Virtual") {
            if (!payload.te_virtual_platform || !payload.te_virtual_link) {
              teStub("Virtual events need platform and link.");
              return;
            }
          }
          createSubmit.disabled = true;
          teShowBusy("Creating meeting group, live meetings, and Active tickets…");
          fetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/json", Accept: "application/json" },
            credentials: "same-origin",
            body: JSON.stringify(payload),
          })
            .then(function (r) {
              return r.json().then(function (j) {
                return { ok: r.ok, status: r.status, j: j };
              });
            })
            .then(function (res) {
              if (!res.j || !res.j.ok) {
                teStub((res.j && res.j.error) || "Create failed (" + res.status + ").");
                return;
              }
              var j = res.j;
              teResetTestEventsForm();
              teBumpTestUserGroupCount(j.owner_user_id);
              teSelectSuggestedTestUser(j.suggested_te_user_id);
              teUpdateF2fNote();
              if (window.bootstrap && window.bootstrap.Modal && teAiApproveModalEl) {
                var aiInst = window.bootstrap.Modal.getInstance(teAiApproveModalEl);
                if (aiInst) aiInst.hide();
              }
              if (window.showTnwMessage) {
                window.showTnwMessage(teFormatCommittedMessage(j), {
                  title: "Test events created",
                  variant: "success",
                });
              }
            })
            .catch(function () {
              teStub("Create request failed. Check the connection and server log.");
            })
            .finally(function () {
              createSubmit.disabled = false;
              teHideBusy();
            });
        });
      }
    })();
  </script>

      var pendingObjectUrl = "";

      var modal =
        modalEl && window.bootstrap && window.bootstrap.Modal
          ? window.bootstrap.Modal.getOrCreateInstance(modalEl)
          : null;

      function urlForMg(mgId) {
        return TMPL.replace("/0/", "/" + String(mgId) + "/");
      }
      function showMsg(title, message, variant) {
        if (typeof window.showTnwMessage === "function") {
          window.showTnwMessage(message || "", { title: title || "Notice", variant: variant || "info" });
        }
      }
      function setDropBusy(on) {
        if (dropEl) dropEl.classList.toggle("is-busy", !!on);
      }
      function setSaveBusy(on) {
        if (saveBtn) saveBtn.disabled = !!on || !pendingFile;
        if (saveSpin) saveSpin.classList.toggle("d-none", !on);
      }
      function replaceModalIsOpen() {
        return modalEl && modalEl.classList.contains("show");
      }
      function imageFileFromClipboardData(cd) {
        if (!cd) return null;
        if (cd.files && cd.files.length) {
          for (var j = 0; j < cd.files.length; j++) {
            var g = cd.files[j];
            if (g && g.type && g.type.indexOf("image/") === 0) return g;
          }
        }
        var items = cd.items;
        if (!items || !items.length) return null;
        for (var i = 0; i < items.length; i++) {
          var it = items[i];
          if (it.kind === "file") {
            var f = it.getAsFile();
            if (f && f.type && f.type.indexOf("image/") === 0) return f;
          }
          if (it.type && it.type.indexOf("image/") === 0) {
            var f2 = it.getAsFile();
            if (f2) return f2;
          }
        }
        return null;
      }
      function postImage(mgId, file) {
        var fd = new FormData();
        fd.append("image", file, file.name || "image.png");
        return fetch(urlForMg(mgId), {
          method: "POST",
          body: fd,
          credentials: "same-origin",
          headers: { Accept: "application/json" },
        }).then(function (r) {
          return r.json().then(function (j) {
            return { ok: r.ok, j: j || {} };
          });
        });
      }
      function bustUrl(u) {
        if (typeof window.tnwBustMgImageUrl === "function") {
          return window.tnwBustMgImageUrl(u);
        }
        if (!u) return u;
        return u + (u.indexOf("?") >= 0 ? "&" : "?") + "t=" + String(Date.now());
      }
      function refreshGridThumb(mgId, imageUrl, newFilename) {
        if (typeof window.tnwRefreshOverviewGroupImage === "function") {
          window.tnwRefreshOverviewGroupImage(mgId, imageUrl, newFilename);
        }
        var fnEl = document.getElementById("adminMgImgReplaceFilename");
        if (fnEl && newFilename != null && newFilename !== "") fnEl.textContent = newFilename;
      }
      function clearPending() {
        pendingFile = null;
        if (pendingObjectUrl) {
          try {
            URL.revokeObjectURL(pendingObjectUrl);
          } catch (e) {}
        }
        pendingObjectUrl = "";
        if (saveBtn) saveBtn.disabled = true;
        if (saveSpin) saveSpin.classList.add("d-none");
      }
      function stageFile(file) {
        if (!currentMgId || !file) return;
        if (!file.type || file.type.indexOf("image/") !== 0) {
          showMsg("Not an image", "Choose a JPG, PNG, or WebP image.", "warning");
          return;
        }
        clearPending();
        pendingFile = file;
        if (previewEl) {
          pendingObjectUrl = URL.createObjectURL(file);
          previewEl.src = pendingObjectUrl;
        }
        if (saveBtn) saveBtn.disabled = false;
        var hint = document.getElementById("adminMgImgReplaceHint");
        if (hint) hint.textContent = (hint.textContent || "").replace(/\s*Choose\/paste.*$/i, "").trim() + " Choose/paste an image, then click Save image.";
      }
      function stageFileWithCrop(file) {
        if (!file) return;
        if (typeof window.tnwOpenSquareImageCrop === "function") {
          window.tnwOpenSquareImageCrop(file, {
            dialogTitle: "Crop group image",
            messageTitle: "Replace image",
            defaultFileNameBase: "group-image",
            onCroppedFile: stageFile,
          });
          return;
        }
        stageFile(file);
      }
      function applyUpload() {
        if (!currentMgId || !pendingFile) return;
        setDropBusy(true);
        setSaveBusy(true);
        postImage(currentMgId, pendingFile)
          .then(function (pack) {
            if (!pack.j || !pack.j.ok) {
              showMsg("Replace failed", (pack.j && pack.j.error) || "Upload failed.", "danger");
              return;
            }
            var j = pack.j;
            var msg = j.in_place
              ? "The image file was overwritten on disk (same filename)."
              : "A new image file was saved and the event group was updated.";
            refreshGridThumb(currentMgId, j.image_url, j.image_filename);
            if (previewEl && j.image_url) previewEl.src = bustUrl(j.image_url);
            showMsg("Image updated", msg, "success");
            clearPending();
          })
          .catch(function () {
            showMsg("Replace failed", "Network or server error.", "danger");
          })
          .finally(function () {
            setDropBusy(false);
            setSaveBusy(false);
          });
      }
      function openReplaceModal(data) {
        if (!modal || !data || !data.id) return;
        currentMgId = parseInt(data.id, 10) || 0;
        document.getElementById("adminMgImgReplaceGroupName").textContent = data.name || "(Untitled group)";
        document.getElementById("adminMgImgReplaceId").textContent = String(data.id);
        document.getElementById("adminMgImgReplaceEmail").textContent = data.email || "—";
        var fn = (data.filename || "").trim();
        document.getElementById("adminMgImgReplaceFilename").textContent = fn || "(none — site placeholder)";
        var hint = document.getElementById("adminMgImgReplaceHint");
        if (hint) {
          hint.textContent = fn
            ? "The new image will be resized to PNG and written over the existing file. The database filename stays the same."
            : "This group has no image file yet. The first upload will create a new file on disk and store its name on the event group.";
        }
        if (previewEl) previewEl.src = data.src || "";
        if (fileEl) fileEl.value = "";
        clearPending();
        modal.show();
        function focusDropWhenReady() {
          if (!dropEl || !replaceModalIsOpen()) return;
          try {
            dropEl.focus({ preventScroll: true });
          } catch (err) {
            dropEl.focus();
          }
        }
        modalEl.addEventListener("shown.bs.modal", focusDropWhenReady, { once: true });
        setTimeout(focusDropWhenReady, 50);
        setTimeout(focusDropWhenReady, 350);
      }
      function readMgCardData(el) {
        var id = parseInt(el.getAttribute("data-mg-id") || "0", 10) || 0;
        return {
          id: id,
          name: el.getAttribute("data-mg-name") || "",
          email: el.getAttribute("data-mg-email") || "",
          filename: el.getAttribute("data-mg-filename") || "",
          src: el.getAttribute("data-mg-src") || "",
        };
      }
      document.querySelectorAll(".js-admin-mg-img-card").forEach(function (card) {
        function openFromCard() {
          var data = readMgCardData(card);
          if (!data.id) {
            showMsg("Error", "Missing event group on this card.", "danger");
            return;
          }
          openReplaceModal(data);
        }
        card.addEventListener("click", openFromCard);
        card.addEventListener("keydown", function (e) {
          if (e.key === "Enter" || e.key === " ") {
            e.preventDefault();
            openFromCard();
          }
        });
      });
      document.querySelectorAll(".js-admin-mg-img-replace-open").forEach(function (btn) {
        btn.addEventListener("click", function () {
          var data = readMgCardData(btn);
          if (!data.id) {
            showMsg("Error", "Missing event group id.", "danger");
            return;
          }
          openReplaceModal(data);
        });
      });
      if (pickBtn && fileEl) {
        pickBtn.addEventListener("click", function () {
          fileEl.click();
        });
        fileEl.addEventListener("change", function () {
          var f = fileEl.files && fileEl.files[0];
          fileEl.value = "";
          if (f) stageFileWithCrop(f);
        });
      }
      if (saveBtn) {
        saveBtn.addEventListener("click", function () {
          applyUpload();
        });
      }
      document.addEventListener(
        "paste",
        function (e) {
          if (!replaceModalIsOpen() || !currentMgId) return;
          var f = imageFileFromClipboardData(e.clipboardData);
          if (!f) return;
          e.preventDefault();
          e.stopPropagation();
          stageFileWithCrop(f);
        },
        true
      );
      if (dropEl) {
        ["dragenter", "dragover"].forEach(function (ev) {
          dropEl.addEventListener(ev, function (e) {
            e.preventDefault();
            e.stopPropagation();
            dropEl.classList.add("is-dragover");
          });
        });
        dropEl.addEventListener("dragleave", function (e) {
          e.preventDefault();
          dropEl.classList.remove("is-dragover");
        });
        dropEl.addEventListener("drop", function (e) {
          e.preventDefault();
          e.stopPropagation();
          dropEl.classList.remove("is-dragover");
          var f = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
          if (!f || !f.type || f.type.indexOf("image/") !== 0) {
            showMsg("Drop not accepted", "Drop a single image file (JPG, PNG, or WebP).", "warning");
            return;
          }
          stageFileWithCrop(f);
        });
      }
    })();
  </script>
