  <script>
    (function () {
      var overlay = document.getElementById("adminOverviewGridLoading");
      var wrap = document.getElementById("adminOverviewGridWrap");

      function showAdminOverviewGridLoading() {
        if (!overlay) return;
        overlay.classList.add("is-visible");
        overlay.setAttribute("aria-hidden", "false");
        overlay.setAttribute("aria-busy", "true");
      }

      function hideAdminOverviewGridLoading() {
        if (!overlay) return;
        overlay.classList.remove("is-visible");
        overlay.setAttribute("aria-hidden", "true");
        overlay.setAttribute("aria-busy", "false");
      }

      window.addEventListener("pageshow", hideAdminOverviewGridLoading);

      function wireAdminIgnoreTestUsersForm(formId, cbId, hiddenId) {
        var form = document.getElementById(formId);
        if (!form) return;
        form.addEventListener("submit", function () {
          var cb = document.getElementById(cbId);
          var h = document.getElementById(hiddenId);
          if (cb && h) h.value = cb.checked ? "1" : "0";
        });
      }
      wireAdminIgnoreTestUsersForm("adminOvFilterForm", "adminOvIgnoreTestCb", "adminOvIgnoreTestHidden");
      wireAdminIgnoreTestUsersForm("adminUsersFilterForm", "adminUsersIgnoreTestCb", "adminUsersIgnoreTestHidden");
      wireAdminIgnoreTestUsersForm("adminImgFilterForm", "adminImgIgnoreTestCb", "adminImgIgnoreTestHidden");
      wireAdminIgnoreTestUsersForm("adminMoveEventsFilterForm", "adminMoveIgnoreTestCb", "adminMoveIgnoreTestHidden");

      var filterForm = document.getElementById("adminOvFilterForm");
      if (filterForm) {
        filterForm.addEventListener("submit", showAdminOverviewGridLoading);
      }

      document.querySelectorAll(".js-admin-ov-grid-reload").forEach(function (el) {
        el.addEventListener("click", showAdminOverviewGridLoading);
      });

      if (wrap) {
        wrap.addEventListener("click", function (ev) {
          var a = ev.target.closest && ev.target.closest("a[href]");
          if (!a || !wrap.contains(a)) return;
          var href = a.getAttribute("href") || "";
          if (!href || href === "#" || href.indexOf("javascript:") === 0) return;
          if (a.getAttribute("target") === "_blank" || a.getAttribute("download") != null) return;
          showAdminOverviewGridLoading();
        });
      }

      ["adminBulkCascadeDeleteForm", "adminBulkTransferForm", "adminRowCascadeDeleteForm", "adminMoveEventsForm", "adminDeleteGroupEventsForm"].forEach(function (fid) {
        var f = document.getElementById(fid);
        if (f) f.addEventListener("submit", showAdminOverviewGridLoading);
      });
    })();
  </script>
  <script>
    (function () {
      var modalEl = document.getElementById("adminMgDescModal");
      if (!modalEl || !window.bootstrap || !window.bootstrap.Modal) return;
      var modal = window.bootstrap.Modal.getOrCreateInstance(modalEl);
      var nameInput = document.getElementById("adminMgDescNameInput");
      var websiteInput = document.getElementById("adminMgDescWebsiteInput");
      var idEl = document.getElementById("adminMgDescGroupId");
      var ownerEl = document.getElementById("adminMgDescOwnerEmail");
      var ta = document.getElementById("adminMgDescTextarea");
      var editor = document.getElementById("adminMgDescEditor");
      var hint = document.getElementById("adminMgDescHint");
      var saveBtn = document.getElementById("adminMgDescSaveBtn");
      var saveSpin = document.getElementById("adminMgDescSaveSpin");
      var currentUrl = "";
      var currentId = "";
      var richWired = false;

      function syncDescEditor() {
        if (editor && window.tnwSyncRichEditorToInput) {
          window.tnwSyncRichEditorToInput(editor, false);
        }
      }

      function setEditorHtml(html) {
        if (ta) ta.value = html || "";
        if (editor) {
          editor.innerHTML = window.tnwRichValueToEditorHtml
            ? window.tnwRichValueToEditorHtml(html || "")
            : html || "";
        }
        syncDescEditor();
      }

      function ensureRichTextWired() {
        if (richWired || !window.tnwWireRichTextEditors) return;
        window.tnwWireRichTextEditors(modalEl);
        richWired = true;
      }

      function setBusy(on) {
        if (saveBtn) saveBtn.disabled = !!on;
        if (nameInput) nameInput.disabled = !!on;
        if (websiteInput) websiteInput.disabled = !!on;
        if (editor) editor.setAttribute("contenteditable", on ? "false" : "true");
        if (saveSpin) saveSpin.classList.toggle("d-none", !on);
      }

      function updateGridName(mgId, newName) {
        if (!mgId) return;
        var openBtn = document.querySelector(
          '.js-admin-mg-desc-open[data-meeting-group-id="' + CSS.escape(String(mgId)) + '"]'
        );
        if (openBtn) {
          var tr = openBtn.closest("tr");
          if (tr) {
            var nameTd = tr.querySelector("td.fw-medium");
            if (nameTd) nameTd.textContent = newName;
          }
        }
        document.querySelectorAll('[data-meeting-group-id="' + CSS.escape(String(mgId)) + '"]').forEach(function (el) {
          if (el.hasAttribute("data-mg-name")) el.setAttribute("data-mg-name", newName);
          if (el.hasAttribute("data-group-name")) el.setAttribute("data-group-name", newName);
        });
      }

      function setHint(msg) {
        if (!hint) return;
        hint.textContent = msg || "";
      }

      function openFor(btn) {
        currentUrl = (btn.getAttribute("data-desc-url") || "").trim();
        currentId = (btn.getAttribute("data-meeting-group-id") || "").trim();
        if (!currentUrl) return;
        if (nameInput) nameInput.value = "";
        if (websiteInput) websiteInput.value = "";
        if (idEl) idEl.textContent = currentId || "";
        if (ownerEl) ownerEl.textContent = "";
        setEditorHtml("");
        setHint("Loading…");
        setBusy(true);
        ensureRichTextWired();
        modal.show();
        fetch(currentUrl, { credentials: "same-origin", headers: { Accept: "application/json" } })
          .then(function (r) { return r.json().then(function (j) { return { ok: r.ok, json: j }; }); })
          .then(function (res) {
            setBusy(false);
            var j = res.json || {};
            if (!res.ok || !j.ok) {
              setHint((j && j.error) || "Could not load the event group.");
              return;
            }
            if (nameInput) nameInput.value = j.meeting_group_name || "";
            if (websiteInput) websiteInput.value = j.website_url || "";
            if (idEl) idEl.textContent = String(j.meeting_group_id || currentId || "");
            if (ownerEl) ownerEl.textContent = (j.owner_email || "").trim() ? ("· " + j.owner_email) : "";
            setEditorHtml(j.description || "");
            setHint("Edit the name, website, and description, then save.");
          })
          .catch(function () {
            setBusy(false);
            setHint("Network error while loading the description.");
          });
      }

      document.addEventListener("click", function (ev) {
        var btn = ev.target && ev.target.closest ? ev.target.closest(".js-admin-mg-desc-open") : null;
        if (!btn) return;
        ev.preventDefault();
        openFor(btn);
      });

      if (saveBtn) {
        saveBtn.addEventListener("click", function () {
          if (!currentUrl) return;
          var groupName = nameInput ? nameInput.value.trim() : "";
          if (!groupName) {
            setHint("Please enter an event group name.");
            if (nameInput) nameInput.focus();
            return;
          }
          syncDescEditor();
          setBusy(true);
          setHint("Saving…");
          fetch(currentUrl, {
            method: "POST",
            credentials: "same-origin",
            headers: { "Content-Type": "application/json", Accept: "application/json" },
            body: JSON.stringify({
              meeting_group_name: groupName,
              website_url: websiteInput ? websiteInput.value.trim() : "",
              description: ta ? ta.value : "",
            }),
          })
            .then(function (r) { return r.json().then(function (j) { return { ok: r.ok, json: j }; }); })
            .then(function (res) {
              setBusy(false);
              var j = res.json || {};
              if (!res.ok || !j.ok) {
                setHint((j && j.error) || "Could not save the event group.");
                return;
              }
              var savedName = (j.meeting_group_name || groupName).trim();
              updateGridName(currentId, savedName);
              modal.hide();
              window.showTnwMessage("Event group saved.", { title: "Event group", variant: "success" });
            })
            .catch(function () {
              setBusy(false);
              setHint("Network error while saving.");
            });
        });
      }
    })();
  </script>
  {% if active_panel == 'move_events' %}
  <script>
    (function () {
      var panel = document.getElementById("adminPanelMoveEvents");
      if (!panel) return;
      var isImpersonating = (panel.getAttribute("data-impersonating") || "") === "1";
      var lookupUrl = (panel.getAttribute("data-lookup-url") || "").trim();
      var eventsFilterForm = document.getElementById("adminMoveEventsFilterForm");
      var eventsSearchBtn = document.getElementById("adminMoveSearchEventsBtn");
      var eventsSearchSpin = panel.querySelector(".admin-move-events-search-spinner");
      var destTitleInp = document.getElementById("adminMoveDestGroupTitleQ");
      var searchBtn = document.getElementById("adminMoveSearchGroupsBtn");
      var searchSpin = panel.querySelector(".admin-move-search-spinner");
      var startBtn = document.getElementById("adminMoveEventsStartBtn");
      var form = document.getElementById("adminMoveEventsForm");
      var mount = document.getElementById("adminMoveMeetingIdsMount");
      var targetHidden = document.getElementById("adminMoveTargetGroupIdHidden");
      var selAll = document.getElementById("adminMoveSelectAll");
      var resultsWrap = document.getElementById("adminMoveDestResultsWrap");
      var resultsList = document.getElementById("adminMoveDestResultsList");
      var resultsHint = document.getElementById("adminMoveDestResultsHint");
      var confirmModalEl = document.getElementById("adminMoveEventsConfirmModal");
      var confirmSummary = document.getElementById("adminMoveEventsConfirmSummary");
      var confirmBtn = document.getElementById("adminMoveEventsConfirmSubmit");
      var confirmSpin = panel.querySelector(".admin-move-confirm-spinner");

      function clearEl(el) {
        if (!el) return;
        while (el.firstChild) el.removeChild(el.firstChild);
      }

      function selectedMeetingIds() {
        var ids = [];
        panel.querySelectorAll(".js-admin-move-mtg-cb:checked").forEach(function (cb) {
          var v = (cb.value || "").trim();
          if (v) ids.push(v);
        });
        return ids;
      }

      function setSearchBusy(busy) {
        if (!searchBtn) return;
        searchBtn.disabled = !!busy;
        if (searchSpin) searchSpin.classList.toggle("d-none", !busy);
      }

      function setEventsSearchBusy(busy) {
        if (!eventsSearchBtn) return;
        eventsSearchBtn.disabled = !!busy;
        if (eventsSearchSpin) eventsSearchSpin.classList.toggle("d-none", !busy);
      }

      function setConfirmBusy(busy) {
        if (!confirmBtn) return;
        confirmBtn.disabled = !!busy;
        if (confirmSpin) confirmSpin.classList.toggle("d-none", !busy);
      }

      function clearDestSearchResults() {
        if (resultsList) clearEl(resultsList);
        if (resultsHint) {
          resultsHint.textContent = "";
          resultsHint.classList.add("d-none");
        }
        if (resultsWrap) resultsWrap.classList.add("d-none");
      }

      function syncSelectAll() {
        if (!selAll) return;
        var boxes = panel.querySelectorAll(".js-admin-move-mtg-cb");
        if (!boxes.length) {
          selAll.checked = false;
          selAll.indeterminate = false;
          return;
        }
        var n = 0;
        boxes.forEach(function (b) {
          if (b.checked) n += 1;
        });
        selAll.checked = n === boxes.length;
        selAll.indeterminate = n > 0 && n < boxes.length;
      }

      if (selAll) {
        selAll.addEventListener("change", function () {
          var on = selAll.checked;
          panel.querySelectorAll(".js-admin-move-mtg-cb").forEach(function (cb) {
            cb.checked = on;
          });
        });
        panel.querySelectorAll(".js-admin-move-mtg-cb").forEach(function (cb) {
          cb.addEventListener("change", syncSelectAll);
        });
        syncSelectAll();
      }

      function fillMeetingMounts(ids) {
        clearEl(mount);
        ids.forEach(function (id) {
          var inp = document.createElement("input");
          inp.type = "hidden";
          inp.name = "meeting_ids";
          inp.value = id;
          mount.appendChild(inp);
        });
      }

      function resetConfirmModal() {
        if (targetHidden) targetHidden.value = "";
        setConfirmBusy(false);
      }

      if (eventsFilterForm && eventsSearchBtn) {
        eventsFilterForm.addEventListener("submit", function () {
          setEventsSearchBusy(true);
        });
      }

      if (destTitleInp) {
        destTitleInp.addEventListener("input", function () {
          clearDestSearchResults();
        });
      }

      if (
        searchBtn &&
        startBtn &&
        form &&
        mount &&
        targetHidden &&
        destTitleInp &&
        resultsWrap &&
        resultsList &&
        resultsHint &&
        confirmModalEl &&
        confirmSummary &&
        confirmBtn &&
        lookupUrl &&
        window.bootstrap &&
        window.bootstrap.Modal
      ) {
        confirmModalEl.addEventListener("hidden.bs.modal", resetConfirmModal);

        searchBtn.addEventListener("click", function () {
          var q = (destTitleInp.value || "").trim();
          if (!q.length) {
            destTitleInp.classList.add("is-invalid");
            window.showTnwMessage("Enter part of the destination event group title first.", {
              title: "Search groups",
              variant: "warning",
            });
            return;
          }
          destTitleInp.classList.remove("is-invalid");

          setSearchBusy(true);
          clearDestSearchResults();
          var url = lookupUrl + "?q=" + encodeURIComponent(q);
          fetch(url, { credentials: "same-origin", headers: { Accept: "application/json" } })
            .then(function (r) {
              return r.json().then(function (j) {
                return { ok: r.ok, json: j };
              });
            })
            .then(function (res) {
              setSearchBusy(false);
              var j = res.json || {};
              if (!res.ok || !j.ok) {
                window.showTnwMessage((j && j.error) || "Could not search event groups.", {
                  title: "Search failed",
                  variant: "danger",
                });
                return;
              }
              var groups = j.groups || [];
              if (!groups.length) {
                window.showTnwMessage(
                  "No event groups matched. Try a different spelling or a longer fragment.",
                  { title: "No groups found", variant: "warning" }
                );
                return;
              }

              groups.forEach(function (g, idx) {
                var rid = "adminMoveDestChoice_" + idx;
                var wrap = document.createElement("div");
                wrap.className = "form-check m-0";
                var inp = document.createElement("input");
                inp.type = "radio";
                inp.className = "form-check-input";
                inp.name = "admin_move_dest_choice";
                inp.id = rid;
                inp.value = String(g.id);
                var lab = document.createElement("label");
                lab.className = "form-check-label small";
                lab.setAttribute("for", rid);
                var em = g.owner_email ? " · " + g.owner_email : "";
                lab.textContent = g.name + " (ID " + g.id + em + ")";
                wrap.appendChild(inp);
                wrap.appendChild(lab);
                resultsList.appendChild(wrap);
              });
              if (groups.length === 1) {
                var only = resultsList.querySelector("input[name=admin_move_dest_choice]");
                if (only) only.checked = true;
              }
              if (j.truncated) {
                resultsHint.textContent =
                  "Showing the first 50 matches. Type a more specific title fragment if the group you need is not listed.";
                resultsHint.classList.remove("d-none");
              }
              resultsWrap.classList.remove("d-none");
            })
            .catch(function () {
              setSearchBusy(false);
              window.showTnwMessage("Network error while searching groups.", {
                title: "Error",
                variant: "danger",
              });
            });
        });

        confirmBtn.addEventListener("click", function () {
          setConfirmBusy(true);
        });

        startBtn.addEventListener("click", function () {
          var ids = selectedMeetingIds();
          if (!ids.length) {
            window.showTnwMessage("Select at least one event in the grid first.", {
              title: "No events selected",
              variant: "warning",
            });
            return;
          }
          if (!resultsList || resultsWrap.classList.contains("d-none")) {
            window.showTnwMessage(
              "Use Search groups to list destination event groups, then select one before moving.",
              { title: "Search destination groups", variant: "warning" }
            );
            return;
          }
          var picked = resultsList.querySelector("input[name=admin_move_dest_choice]:checked");
          if (!picked) {
            window.showTnwMessage("Select exactly one destination event group from the list.", {
              title: "Choose a group",
              variant: "warning",
            });
            return;
          }
          var labEl = resultsList.querySelector("label[for=\"" + picked.id + "\"]");
          var gLabel = labEl ? labEl.textContent.trim() : "group " + picked.value;

          fillMeetingMounts(ids);
          resetConfirmModal();
          targetHidden.value = (picked.value || "").trim();
          confirmSummary.textContent =
            "Move " +
            ids.length +
            " event" +
            (ids.length === 1 ? "" : "s") +
            ' to "' +
            gLabel +
            '".';

          window.bootstrap.Modal.getOrCreateInstance(confirmModalEl).show();
        });

        confirmBtn.addEventListener("click", function (ev) {
          ev.preventDefault();
          var gid = (targetHidden.value || "").trim();
          if (!gid) {
            window.showTnwMessage("Nothing to confirm. Close this dialog and try again.", {
              title: "Move",
              variant: "warning",
            });
            return;
          }
          if (typeof form.requestSubmit === "function") {
            form.requestSubmit();
          } else {
            form.submit();
          }
        });
      }
    })();
  </script>

  <script>
    (function () {
      function clearEl(el) {
        if (!el) return;
        while (el.firstChild) el.removeChild(el.firstChild);
      }

      /** Only allow POST after the matching modal's confirm (danger) button was clicked. */
      function wireModalDangerSubmit(modalEl, formEl, submitBtnEl) {
        if (!modalEl || !formEl || !submitBtnEl) return;
        var armed = false;
        submitBtnEl.addEventListener("click", function () {
          armed = true;
        });
        modalEl.addEventListener("hidden.bs.modal", function () {
          armed = false;
        });
        formEl.addEventListener("submit", function (e) {
          if (!armed) {
            e.preventDefault();
            e.stopPropagation();
            return false;
          }
          armed = false;
        });
      }

      function fillRowCascadeDeleteBody(btn) {
        var body = document.getElementById("adminRowCascadeDeleteBody");
        var idInput = document.getElementById("adminRowCascadeDeleteGroupId");
        if (!body || !idInput || !btn) return;
        clearEl(body);
        var gid = (btn.getAttribute("data-group-id") || "").trim();
        idInput.value = gid;
        var gname = (btn.getAttribute("data-group-name") || "").trim();
        var tot = parseInt(btn.getAttribute("data-meetings-total") || "0", 10) || 0;
        var lv = parseInt(btn.getAttribute("data-meetings-live") || "0", 10) || 0;
        var dr = parseInt(btn.getAttribute("data-meetings-draft") || "0", 10) || 0;
        var gridMeta = document.getElementById("adminOverviewGridWrap");
        var mpl = gridMeta ? (gridMeta.getAttribute("data-meeting-plural") || "Meetings") : "Meetings";
        var mplLower = mpl.toLowerCase();
        var intro = document.createElement("p");
        intro.className = "mb-3";
        intro.appendChild(document.createTextNode("You are about to permanently delete the event group "));
        var strong = document.createElement("strong");
        strong.textContent = gname || ("ID " + gid);
        intro.appendChild(strong);
        intro.appendChild(document.createTextNode(". This cannot be undone."));
        body.appendChild(intro);
        var sub = document.createElement("p");
        sub.className = "small fw-semibold mb-2";
        sub.textContent = "Cascade delete will remove:";
        body.appendChild(sub);
        var ul = document.createElement("ul");
        ul.className = "small mb-3";
        function addLi(text) {
          var li = document.createElement("li");
          li.textContent = text;
          ul.appendChild(li);
        }
        if (tot > 0) {
          addLi(
            String(tot) +
              " " +
              mplLower +
              " (" +
              String(lv) +
              " live, " +
              String(dr) +
              " draft), including ticket types and attendee records for those events"
          );
        } else {
          addLi("No " + mplLower + " in this group (nothing under the group besides metadata)");
        }
        addLi("Keyword / tag links attached to this group");
        addLi("The uploaded group image file on disk, if one exists");
        body.appendChild(ul);
        var warn = document.createElement("p");
        warn.className = "small text-danger mb-0";
        warn.textContent = "There is no recovery after you confirm.";
        body.appendChild(warn);
      }

      var rowDelModalEl = document.getElementById("adminRowCascadeDeleteModal");
      var rowDelModal = rowDelModalEl && window.bootstrap && window.bootstrap.Modal
        ? window.bootstrap.Modal.getOrCreateInstance(rowDelModalEl)
        : null;

      document.querySelectorAll(".js-admin-row-delete-open").forEach(function (btn) {
        btn.addEventListener("click", function (e) {
          e.preventDefault();
          e.stopPropagation();
          if (!rowDelModal) return;
          fillRowCascadeDeleteBody(btn);
          rowDelModal.show();
        });
      });
      wireModalDangerSubmit(
        rowDelModalEl,
        document.getElementById("adminRowCascadeDeleteForm"),
        document.getElementById("adminRowCascadeDeleteSubmit")
      );

      var userDelModalEl = document.getElementById("adminUserDeleteModal");
      var userDelForm = document.getElementById("adminUserDeleteForm");
      var userDelModal =
        userDelModalEl && window.bootstrap && window.bootstrap.Modal
          ? window.bootstrap.Modal.getOrCreateInstance(userDelModalEl)
          : null;

      function fillAdminUserDeleteBody(btn) {
        var body = document.getElementById("adminUserDeleteModalBody");
        if (!body || !btn || !userDelForm) return;
        clearEl(body);
        var action = (btn.getAttribute("data-delete-url") || "").trim();
        userDelForm.setAttribute("action", action);
        var uid = (btn.getAttribute("data-user-id") || "").trim();
        var uname = (btn.getAttribute("data-username") || "").trim();
        var email = (btn.getAttribute("data-email") || "").trim();
        var ng = parseInt(btn.getAttribute("data-n-groups") || "0", 10) || 0;
        var nar = parseInt(btn.getAttribute("data-n-attendee-rows") || "0", 10) || 0;
        var ncr = parseInt(btn.getAttribute("data-n-creator") || "0", 10) || 0;
        var ni = parseInt(btn.getAttribute("data-n-industries") || "0", 10) || 0;
        var nt = parseInt(btn.getAttribute("data-n-attendee-tags") || "0", 10) || 0;

        var intro = document.createElement("p");
        intro.className = "mb-3";
        intro.appendChild(document.createTextNode("You are about to permanently delete the user "));
        var strong = document.createElement("strong");
        strong.textContent = uname || ("ID " + uid);
        intro.appendChild(strong);
        intro.appendChild(document.createTextNode(" (" + email + "). This cannot be undone."));
        body.appendChild(intro);

        var sub = document.createElement("p");
        sub.className = "small fw-semibold mb-2";
        sub.textContent = "Related data that will be removed or updated:";
        body.appendChild(sub);

        var ul = document.createElement("ul");
        ul.className = "small mb-3";
        function addUserDelLi(t) {
          var li = document.createElement("li");
          li.textContent = t;
          ul.appendChild(li);
        }
        if (ng > 0) {
          addUserDelLi(
            String(ng) +
              " owned event group(s) and all of their meetings, tickets, attendees, and group images (cascade delete)."
          );
        } else {
          addUserDelLi("No owned event groups.");
        }
        if (nar > 0) {
          addUserDelLi(String(nar) + " attendee / ticket row(s) for this user will be deleted.");
        }
        if (ncr > 0) {
          addUserDelLi(
            String(ncr) +
              " meeting(s) where this user is recorded as creator will have creator reassigned to the event group owner."
          );
        }
        if (ni > 0) {
          addUserDelLi(String(ni) + " organiser industry link(s) on their profile.");
        }
        if (nt > 0) {
          addUserDelLi(String(nt) + " profile keyword link(s).");
        }
        if (ng === 0 && nar === 0 && ncr === 0 && ni === 0 && nt === 0) {
          addUserDelLi("No dependent records found beyond the account row itself.");
        }
        body.appendChild(ul);

        var warn = document.createElement("p");
        warn.className = "small text-danger mb-0";

      function applyDeleteEventsOwnerFilter() {
        var sel = document.getElementById("adminDeleteEventsGroupSelect");
        var filterEl = document.getElementById("adminDeleteEventsOwnerFilter");
        if (!sel || !filterEl) return;
        var q = String(filterEl.value || "").trim().toLowerCase();
        var selectedOpt = sel.selectedOptions && sel.selectedOptions[0];
        var selectedValue = selectedOpt ? String(selectedOpt.value || "") : "";
        var hasSelectedVisible = false;
        Array.prototype.slice.call(sel.options || []).forEach(function (opt, idx) {
          if (idx === 0 || !opt.value) {
            opt.hidden = false;
            opt.disabled = false;
            return;
          }
          var owner = String(opt.getAttribute("data-owner-email") || "").toLowerCase();
          var show = !q || owner.indexOf(q) !== -1;
          opt.hidden = !show;
          opt.disabled = !show;
          if (show && selectedValue && String(opt.value) === selectedValue) {
            hasSelectedVisible = true;
          }
        });
        if (selectedValue && !hasSelectedVisible) {
          sel.value = "";
        }
        loadDeleteEventsForSelectedGroup();
      }

      function loadDeleteEventsForSelectedGroup() {
        var sel = document.getElementById("adminDeleteEventsGroupSelect");
        var list = document.getElementById("adminDeleteEventsList");

        var opt = sel.selectedOptions && sel.selectedOptions[0];
        if (!opt || !opt.value) {

          list.textContent = "Choose a group to load events.";
          syncDeleteEventsSummaryFromSelection();
          return;

        var gid = String(opt.value || "").trim();
        var tpl = {{ url_for('main.admin_meeting_group_events_for_delete', meeting_group_id=0) | tojson }};
        var endpoint = tpl.replace("/0/events-for-delete", "/" + gid + "/events-for-delete");
        list.className = "small text-muted";
        list.textContent = "Loading events...";
        fetch(endpoint, { credentials: "same-origin", headers: { Accept: "application/json" } })
          .then(function (res) {
            return res.text().then(function (txt) {
              var data = {};
              try { data = txt ? JSON.parse(txt) : {}; } catch (_e) {}
              return { ok: res.ok, data: data };
            });
          })
          .then(function (wrapped) {
            if (!wrapped.ok || !wrapped.data || !wrapped.data.ok) {

            renderDeleteEventsList(wrapped.data.events || []);

            syncDeleteEventsSummaryFromSelection();

        function provisionNewUserThenSubmitTransfer() {
          var items = selectedBulkItems();
          if (!items.length) {
            bulkTransferShowModalAlert(
              "Select at least one event group in the table (tick column on the right), then try again."
            );
            return;
          }
          var unameInp = document.getElementById("adminBulkProvisionUsername");
          var emailInp = document.getElementById("adminBulkProvisionEmail");
          var username = unameInp && unameInp.value ? unameInp.value.trim() : "";
          var emailRaw = emailInp && emailInp.value ? emailInp.value.trim() : "";
          var emailLc = emailRaw.toLowerCase();
          if (!validateProvisionClient(username, emailLc)) {
            return;
          }
          var spin = document.getElementById("adminBulkTransferReviewSpinner");
          bulkTransferReviewBtn.disabled = true;
          if (spin) spin.classList.remove("d-none");
          fetch(BULK_PROVISION_USER_URL, {
            method: "POST",
            credentials: "same-origin",
            headers: {
              Accept: "application/json",
              "Content-Type": "application/json",
            },
            body: JSON.stringify({ username: username, email: emailLc }),
          })
            .then(function (r) {
              return r.text().then(function (t) {
                var j = {};
                try {
                  j = t ? JSON.parse(t) : {};
                } catch (err) {}
                return { ok: r.ok, j: j };
              });
            })
            .then(function (pack) {
              if (!pack.ok || !pack.j.ok) {
                bulkTransferClearInlineErrors();
                var err = (pack.j && pack.j.error) || "Could not create the user.";
                var f = pack.j && pack.j.field;
                if (f === "username") {
                  bulkTransferSetFieldError(
                    "adminBulkProvisionUsername",
                    "adminBulkProvisionUsernameFb",
                    err
                  );
                } else if (f === "email") {
                  bulkTransferSetFieldError(
                    "adminBulkProvisionEmail",
                    "adminBulkProvisionEmailFb",
                    err
                  );
                } else {
                  bulkTransferShowModalAlert(err);
                }
                return;
              }
              var sel = document.getElementById("adminBulkTransferTargetUserSelect");
              ensureTransferSelectHasUser(
                sel,
                pack.j.user_id,
                pack.j.email || emailLc
              );
              initBulkTransferUserBackup();
              if (!bulkTransferForm) return;
              if (bulkTransferForm.requestSubmit) {
                bulkTransferForm.requestSubmit();
              } else {
                bulkTransferForm.submit();
              }
            })
            .catch(function () {
              bulkTransferClearInlineErrors();
              bulkTransferShowModalAlert(
                "Could not reach the server. Check your connection and try again."
              );
            })
            .finally(function () {
              bulkTransferReviewBtn.disabled = false;
              if (spin) spin.classList.add("d-none");
            });
        }

        bulkTransferReviewBtn.addEventListener("click", function () {
          if (isTransferNewUserTabActive()) {
            provisionNewUserThenSubmitTransfer();
          } else {
            openBulkTransferConfirm();
          }
        });
      }

      (function wireAdminMgViewHoverPopouts() {
        var grid = document.getElementById("adminOverviewGridWrap");
        if (!grid) return;

        function positionHovercard(wrap, card) {
          var gap = 8;
          var rect = wrap.getBoundingClientRect();
          card.classList.add("admin-mg-view-hovercard--floating");
          card.style.display = "block";
          var cardW = card.offsetWidth || 224;
          var cardH = card.offsetHeight || 160;
          var left = rect.right - cardW;
          var top = rect.top - cardH - gap;
          if (top < gap) top = rect.bottom + gap;
          if (left < gap) left = gap;
          if (left + cardW > window.innerWidth - gap) {
            left = Math.max(gap, window.innerWidth - cardW - gap);
          }
          if (top + cardH > window.innerHeight - gap) {
            top = Math.max(gap, window.innerHeight - cardH - gap);
          }
          card.style.left = left + "px";
          card.style.top = top + "px";
        }

        function clearHovercard(card) {
          card.classList.remove("admin-mg-view-hovercard--floating");
          card.style.left = "";
          card.style.top = "";
          card.style.display = "";
        }

        function hoverWrapFromEvent(ev) {
          var t = ev.target;
          return t && t.closest ? t.closest(".admin-mg-view-hover") : null;
        }

        grid.addEventListener("mouseover", function (ev) {
          var wrap = hoverWrapFromEvent(ev);
          if (!wrap || !grid.contains(wrap)) return;
          var card = wrap.querySelector(".admin-mg-view-hovercard");
          if (card) positionHovercard(wrap, card);
        });

        grid.addEventListener("mouseout", function (ev) {
          var wrap = hoverWrapFromEvent(ev);
          if (!wrap || !grid.contains(wrap)) return;
          var related = ev.relatedTarget;
          if (related && wrap.contains(related)) return;
          var card = wrap.querySelector(".admin-mg-view-hovercard");
          if (card) clearHovercard(card);
        });

        grid.addEventListener("focusin", function (ev) {
          var wrap = hoverWrapFromEvent(ev);
          if (!wrap || !grid.contains(wrap)) return;
          var card = wrap.querySelector(".admin-mg-view-hovercard");
          if (card) positionHovercard(wrap, card);
        });

        grid.addEventListener("focusout", function (ev) {
          var wrap = hoverWrapFromEvent(ev);
          if (!wrap || !grid.contains(wrap)) return;
          var related = ev.relatedTarget;
          if (related && wrap.contains(related)) return;
          var card = wrap.querySelector(".admin-mg-view-hovercard");
          if (card) clearHovercard(card);
        });
      })();

      (function initAdminBulkEditToolbar() {

          bulkImagesDrop.addEventListener("dragleave", function () { bulkImagesDrop.classList.remove("is-dragover"); });
          bulkImagesDrop.addEventListener("drop", function (ev) {

            if (f) stageBulkImageWithCrop(f);

        if (bulkImagesModalEl) {
          bulkImagesModalEl.addEventListener("paste", function (ev) {
            var cd = ev.clipboardData;

        if (bulkImagesSave && bulkImagesModalEl) {

            fetch(BULK_IMAGE_URL, { method: "POST", body: fd, credentials: "same-origin", headers: { Accept: "application/json" } })

                  window.showTnwMessage(
                    "Updated images on " + String(res.j.updated || ids.length) + " event group(s).",
                    { title: "Images updated", variant: "success" }

                }
              })
              .catch(function () {

        var bulkDetailsModalEl = document.getElementById("adminBulkDetailsModal");
        var bulkDetailsModal =
          bulkDetailsModalEl && window.bootstrap && window.bootstrap.Modal
            ? window.bootstrap.Modal.getOrCreateInstance(bulkDetailsModalEl)
            : null;
        var bulkDetailsWebsite = document.getElementById("adminBulkDetailsWebsiteInput");
        var bulkDetailsTa = document.getElementById("adminBulkDetailsTextarea");
        var bulkDetailsEditor = document.getElementById("adminBulkDetailsEditor");
        var bulkDetailsSave = document.getElementById("adminBulkDetailsSaveBtn");
        var bulkDetailsSpin = document.getElementById("adminBulkDetailsSaveSpin");
        var bulkDetailsHint = document.getElementById("adminBulkDetailsHint");
        var bulkDetailsRichWired = false;

        function syncBulkDetailsEditor() {
          if (bulkDetailsEditor && window.tnwSyncRichEditorToInput) {
            window.tnwSyncRichEditorToInput(bulkDetailsEditor, false);
          }
        }

        function resetBulkDetailsForm() {
          if (bulkDetailsWebsite) bulkDetailsWebsite.value = "";
          if (bulkDetailsTa) bulkDetailsTa.value = "";
          if (bulkDetailsEditor) bulkDetailsEditor.innerHTML = "";
          if (bulkDetailsHint) bulkDetailsHint.textContent = "Enter the website and description to apply to every selected group.";
        }

        var bulkDetailsOpen = document.getElementById("adminBulkDetailsOpen");
        if (bulkDetailsOpen && bulkDetailsModal) {
          bulkDetailsOpen.addEventListener("click", function () {
            if (!requireBulkSelection("Change details")) return;
            bulkSelectionSummary(document.getElementById("adminBulkDetailsSummary"));
            resetBulkDetailsForm();
            if (!bulkDetailsRichWired && window.tnwWireRichTextEditors) {
              window.tnwWireRichTextEditors(bulkDetailsModalEl);
              bulkDetailsRichWired = true;
            }
            bulkDetailsModal.show();
          });
        }
        if (bulkDetailsSave) {
          bulkDetailsSave.addEventListener("click", function () {
            var ids = bulkSelectionIds();
            if (!ids.length) return;
            syncBulkDetailsEditor();
            bulkDetailsSave.disabled = true;
            if (bulkDetailsSpin) bulkDetailsSpin.classList.remove("d-none");
            if (bulkDetailsHint) bulkDetailsHint.textContent = "Saving…";
            fetch(BULK_DETAILS_URL, {
              method: "POST",
              credentials: "same-origin",
              headers: { "Content-Type": "application/json", Accept: "application/json" },
              body: JSON.stringify({
                meeting_group_ids: ids,
                website_url: bulkDetailsWebsite ? bulkDetailsWebsite.value.trim() : "",
                description: bulkDetailsTa ? bulkDetailsTa.value : "",
              }),
            })
              .then(function (r) { return r.json().then(function (j) { return { ok: r.ok, j: j || {} }; }); })
              .then(function (res) {
                if (!res.ok || !res.j.ok) {
                  if (bulkDetailsHint) bulkDetailsHint.textContent = res.j.error || "Could not save changes.";
                  return;
                }
                if (bulkDetailsModal) bulkDetailsModal.hide();
                window.showTnwMessage(
                  "Updated details on " + String(res.j.updated || ids.length) + " event group(s).",
                  { title: "Details updated", variant: "success" }
                );
              })
              .catch(function () {
                if (bulkDetailsHint) bulkDetailsHint.textContent = "Network error while saving.";
              })
              .finally(function () {
                bulkDetailsSave.disabled = false;
                if (bulkDetailsSpin) bulkDetailsSpin.classList.add("d-none");
              });
          });
        }

        var bulkWebsiteModalEl = document.getElementById("adminBulkWebsiteModal");
        var bulkWebsiteModal =
          bulkWebsiteModalEl && window.bootstrap && window.bootstrap.Modal
            ? window.bootstrap.Modal.getOrCreateInstance(bulkWebsiteModalEl)
            : null;
        var bulkWebsiteInput = document.getElementById("adminBulkWebsiteInput");
        var bulkWebsiteSave = document.getElementById("adminBulkWebsiteSaveBtn");
        var bulkWebsiteSpin = document.getElementById("adminBulkWebsiteSaveSpin");
        var bulkWebsiteHint = document.getElementById("adminBulkWebsiteHint");

        var bulkWebsiteOpen = document.getElementById("adminBulkWebsiteOpen");
        if (bulkWebsiteOpen && bulkWebsiteModal) {
          bulkWebsiteOpen.addEventListener("click", function () {
            if (!requireBulkSelection("Change website")) return;
            bulkSelectionSummary(document.getElementById("adminBulkWebsiteSummary"));
            if (bulkWebsiteInput) bulkWebsiteInput.value = "";
            if (bulkWebsiteHint) bulkWebsiteHint.textContent = "Enter the website URL to apply to every selected group.";
            bulkWebsiteModal.show();
          });
        }
        if (bulkWebsiteSave) {
          bulkWebsiteSave.addEventListener("click", function () {
            var ids = bulkSelectionIds();
            if (!ids.length) return;
            bulkWebsiteSave.disabled = true;
            if (bulkWebsiteSpin) bulkWebsiteSpin.classList.remove("d-none");
            if (bulkWebsiteHint) bulkWebsiteHint.textContent = "Saving…";
            fetch(BULK_WEBSITE_URL, {
              method: "POST",
              credentials: "same-origin",
              headers: { "Content-Type": "application/json", Accept: "application/json" },
              body: JSON.stringify({
                meeting_group_ids: ids,
                website_url: bulkWebsiteInput ? bulkWebsiteInput.value.trim() : "",
              }),
            })
              .then(function (r) { return r.json().then(function (j) { return { ok: r.ok, j: j || {} }; }); })
              .then(function (res) {
                if (!res.ok || !res.j.ok) {
                  if (bulkWebsiteHint) bulkWebsiteHint.textContent = res.j.error || "Could not save website URLs.";
                  return;
                }
                if (bulkWebsiteModal) bulkWebsiteModal.hide();
                window.showTnwMessage(
                  "Updated website on " + String(res.j.updated || ids.length) + " event group(s).",
                  { title: "Website updated", variant: "success" }
                );
              })
              .catch(function () {
                if (bulkWebsiteHint) bulkWebsiteHint.textContent = "Network error while saving.";
              })
              .finally(function () {
                bulkWebsiteSave.disabled = false;
                if (bulkWebsiteSpin) bulkWebsiteSpin.classList.add("d-none");
              });
          });
        }
      })();

      function escMg(s) {
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }
      function escAttrMg(s) {
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/"/g, "&quot;")
          .replace(/</g, "&lt;")
          .replace(/'/g, "&#39;");
      }

      var MG_KW_SUGGEST_URL = {{ url_for('main.admin_meeting_groups_suggest_keywords') | tojson }};
      var MG_KW_APPLY_URL = {{ url_for('main.admin_meeting_groups_apply_tag_suggestions') | tojson }};
      var mgKwSuggestModalEl = document.getElementById("adminMgKwSuggestModal");
      var mgKwSuggestModal =
        mgKwSuggestModalEl && window.bootstrap && window.bootstrap.Modal
          ? window.bootstrap.Modal.getOrCreateInstance(mgKwSuggestModalEl)
          : null;
      var mgKwSuggestBody = document.getElementById("adminMgKwSuggestModalBody");
      var mgKwSuggestApplyBtn = document.getElementById("adminMgKwSuggestApplyBtn");
      var mgKwApplyConfirmEl = document.getElementById("adminMgKwApplyConfirmModal");
      var mgKwApplyConfirmModal =
        mgKwApplyConfirmEl && window.bootstrap && window.bootstrap.Modal
          ? window.bootstrap.Modal.getOrCreateInstance(mgKwApplyConfirmEl)
          : null;
      var mgKwApplyConfirmBody = document.getElementById("adminMgKwApplyConfirmBody");
      var mgKwApplyConfirmGoBtn = document.getElementById("adminMgKwApplyConfirmGoBtn");
      var pendingMgKwApplyPayload = null;

      function syncMgKwSuggestApplyEnabled() {
        if (!mgKwSuggestApplyBtn || !mgKwSuggestBody) return;
        var n = mgKwSuggestBody.querySelectorAll(".js-admin-mg-kw-cb:checked").length;
        mgKwSuggestApplyBtn.disabled = n === 0;
      }

      function renderMgKwSuggestResults(data) {
        if (!mgKwSuggestBody) return;
        var html = "";
        var meta = data.meta || {};
        if (meta.truncated) {
          html +=
            '<div class="alert alert-warning border border-warning border-opacity-50 small mb-3" role="status">Only the first <strong>' +
            escMg(String(meta.max_batch || "")) +
            "</strong> selected group(s) were sent to the AI in this request. Run again for more.</div>";
        }
        var groups = data.groups || [];
        groups.forEach(function (grow) {
          html += '<section class="mb-4 pb-3 border-bottom border-secondary border-opacity-25">';
          html +=
            '<h3 class="h6 mb-2">' +
            escMg(grow.meeting_group_name || "Group " + String(grow.meeting_group_id)) +
            "</h3>";
          if (grow.topic) {
            html +=
              '<p class="small admin-console-footer-note mb-2">Topic: <strong>' +
              escMg(grow.topic) +
              "</strong></p>";
          }
          if (grow.error) {
            html += '<div class="alert alert-danger py-2 small mb-0">' + escMg(grow.error) + "</div>";
          } else {
            if (grow.notes) {
              html += '<p class="small mb-2">' + escMg(grow.notes).replace(/\n/g, "<br>") + "</p>";
            }
            var adds = grow.suggested_add || [];
            if (!adds.length) {
              html +=
                '<p class="small admin-console-footer-note mb-0">No new keywords suggested for this group.</p>';
            } else {
              html +=
                '<p class="small mb-2">Tick any keywords to attach to this event group.</p><ul class="list-unstyled mb-0">';
              adds.forEach(function (row, idx) {
                var cid = "mgKw-" + grow.meeting_group_id + "-" + row.tag_id + "-" + idx;
                html += '<li class="mb-2 d-flex align-items-start gap-2">';
                html +=
                  '<input type="checkbox" class="form-check-input mt-1 js-admin-mg-kw-cb" id="' +
                  cid +
                  '" data-mgid="' +
                  escAttrMg(String(grow.meeting_group_id)) +
                  '" data-tid="' +
                  escAttrMg(String(row.tag_id)) +
                  '">';
                html += '<label class="form-check-label mb-0" for="' + cid + '">';
                html += "<strong>" + escMg(row.tag || "") + "</strong>";
                if (row.reason) {
                  html +=
                    '<span class="d-block small admin-console-footer-note mt-1">' +
                    escMg(row.reason) +
                    "</span>";
                }
                html += "</label></li>";
              });
              html += "</ul>";
            }
          }
          html += "</section>";
        });
        if (!html) {
          html = '<p class="admin-console-footer-note mb-0">No results.</p>';
        }
        mgKwSuggestBody.innerHTML = html;
        mgKwSuggestBody.querySelectorAll(".js-admin-mg-kw-cb").forEach(function (cb) {
          cb.addEventListener("change", syncMgKwSuggestApplyEnabled);
        });
        syncMgKwSuggestApplyEnabled();
      }

      function openMgKwSuggestLoading() {
        if (!mgKwSuggestBody) return;
        mgKwSuggestBody.innerHTML =
          '<div class="text-center py-4">' +
          '<div class="spinner-border text-info mb-3" role="status" style="width: 2.75rem; height: 2.75rem;"><span class="visually-hidden">Loading…</span></div>' +
          '<p class="fw-semibold mb-1">Calling AI…</p>' +
          '<p class="small admin-console-footer-note mb-0">This may take up to about a minute per event group.</p></div>';
        if (mgKwSuggestApplyBtn) mgKwSuggestApplyBtn.disabled = true;
      }

      function runMgKwSuggestForIds(ids) {
        if (!mgKwSuggestModal || !mgKwSuggestBody) return;
        openMgKwSuggestLoading();
        mgKwSuggestModal.show();
        fetch(MG_KW_SUGGEST_URL, {
          method: "POST",
          credentials: "same-origin",
          headers: { Accept: "application/json", "Content-Type": "application/json" },
          body: JSON.stringify({ meeting_group_ids: ids }),
        })
          .then(function (r) {
            return r.text().then(function (t) {
              var j = {};
              try {
                j = t ? JSON.parse(t) : {};
              } catch (e) {}
              return { ok: r.ok, j: j };
            });
          })
          .then(function (pack) {
            var j = pack.j || {};
            if (!pack.ok || !j.ok) {
              mgKwSuggestModal.hide();
              showToolbarMsg("AI keywords", (j && j.error) || "Could not get suggestions.");
              return;
            }
            renderMgKwSuggestResults(j);
          })
          .catch(function () {
            mgKwSuggestModal.hide();
            showToolbarMsg("AI keywords", "The request failed. Check your connection and try again.");
          });
      }

      function collectMgKwApplyPayload() {
        if (!mgKwSuggestBody) return [];
        var byG = {};
        mgKwSuggestBody.querySelectorAll(".js-admin-mg-kw-cb:checked").forEach(function (cb) {
          var gid = parseInt(cb.getAttribute("data-mgid"), 10);
          var tid = parseInt(cb.getAttribute("data-tid"), 10);
          if (!gid || !tid) return;
          if (!byG[gid]) byG[gid] = [];
          if (byG[gid].indexOf(tid) === -1) byG[gid].push(tid);
        });
        return Object.keys(byG).map(function (k) {
          return { meeting_group_id: parseInt(k, 10), add_tag_ids: byG[k] };
        });
      }

      var ovGridForKw = document.getElementById("adminOverviewGridWrap");
      if (ovGridForKw) {
        ovGridForKw.addEventListener("click", function (ev) {
          var b = ev.target.closest && ev.target.closest(".js-admin-mg-row-kw-suggest");
          if (!b || !ovGridForKw.contains(b) || b.disabled) return;
          var gid = parseInt(b.getAttribute("data-meeting-group-id"), 10);
          if (!gid) return;
          runMgKwSuggestForIds([gid]);
        });
      }

      var bulkMgKwBtn = document.getElementById("adminMgBulkKwSuggestBtn");
      if (bulkMgKwBtn) {
        bulkMgKwBtn.addEventListener("click", function () {
          var items = selectedBulkItems();
          if (!items.length) {
            showToolbarMsg(
              "Nothing selected",
              "Select one or more event groups (right column), then use AI keywords again."
            );
            return;
          }
          var ids = items
            .map(function (it) {
              return parseInt(it.id, 10);
            })
            .filter(function (n) {
              return n > 0;
            });
          runMgKwSuggestForIds(ids);
        });
      }

      if (mgKwSuggestApplyBtn && mgKwSuggestBody) {
        mgKwSuggestApplyBtn.addEventListener("click", function () {
          var updates = collectMgKwApplyPayload();
          if (!updates.length) return;
          var nTags = 0;
          updates.forEach(function (u) {
            nTags += (u.add_tag_ids || []).length;
          });
          pendingMgKwApplyPayload = updates;
          if (mgKwApplyConfirmBody) {
            mgKwApplyConfirmBody.innerHTML =
              "<p class=\"mb-0\">You are about to add <strong>" +
              nTags +
              "</strong> keyword link(s) across <strong>" +
              updates.length +
              "</strong> event group(s). Existing keywords stay unchanged.</p>";
          }
          if (mgKwSuggestModal) mgKwSuggestModal.hide();
          if (mgKwApplyConfirmModal) mgKwApplyConfirmModal.show();
        });
      }

      if (mgKwApplyConfirmGoBtn) {
        mgKwApplyConfirmGoBtn.addEventListener("click", function () {
          if (!pendingMgKwApplyPayload) return;
          mgKwApplyConfirmGoBtn.disabled = true;
          fetch(MG_KW_APPLY_URL, {
            method: "POST",
            credentials: "same-origin",
            headers: { Accept: "application/json", "Content-Type": "application/json" },
            body: JSON.stringify({ updates: pendingMgKwApplyPayload }),
          })
            .then(function (r) {
              return r.text().then(function (t) {
                var j = {};
                try {
                  j = t ? JSON.parse(t) : {};
                } catch (e) {}
                return { ok: r.ok, j: j };
              });
            })
            .then(function (pack) {
              var j = pack.j || {};
              if (mgKwApplyConfirmModal) mgKwApplyConfirmModal.hide();
              if (mgKwSuggestModal) mgKwSuggestModal.hide();
              if (!pack.ok || !j.ok) {
                showToolbarMsg("Apply keywords", (j && j.error) || "Apply failed.");
                pendingMgKwApplyPayload = null;
                return;
              }
              var msg = "Keyword links updated.";
              if (j.notes) msg += " " + j.notes;
              if (window.showTnwMessage) {
                window.showTnwMessage(msg, { title: "Saved" });
              } else {
                showToolbarMsg("Saved", msg);
              }
              pendingMgKwApplyPayload = null;
              window.location.reload();
            })
            .catch(function () {
              if (mgKwApplyConfirmModal) mgKwApplyConfirmModal.hide();
              showToolbarMsg("Apply keywords", "The request failed.");
              pendingMgKwApplyPayload = null;
            })
            .finally(function () {
              mgKwApplyConfirmGoBtn.disabled = false;
            });
        });
      }
    })();
  </script>
  <script>
    (function () {
      var panel = document.getElementById("adminPanelKeywords");
      if (!panel) return;
      var out = document.getElementById("adminKwTagsOutput");
      if (!out) return;
      var TAGS = {{ admin_kw_tags_by_topic | tojson }};

      function escapeHtml(s) {
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function escapeAttr(s) {
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/"/g, "&quot;")
          .replace(/</g, "&lt;")
          .replace(/'/g, "&#39;");
      }

      function renderAdminKwTags() {
        var cbs = panel.querySelectorAll(".js-admin-kw-topic:checked");
        if (!cbs.length) {
          out.innerHTML =
            '<p class="admin-console-footer-note mb-0">Select one or more topics above to show their keywords.</p>';
          return;
        }
        var html = "";
        cbs.forEach(function (cb) {
          var tid = String(cb.value);
          var lab = panel.querySelector('label[for="' + cb.id + '"]');
          var title = (lab && lab.textContent ? lab.textContent : "Topic " + tid).trim();
          var list = TAGS[tid] || [];
          html += '<section class="admin-kw-topic-block mb-3 pb-3 border-bottom border-secondary border-opacity-25">';
          html += "<h4 class=\"mb-2\">" + escapeHtml(title) + "</h4>";
          if (!list.length) {
            html += '<p class="admin-console-footer-note mb-0 small">No keywords for this topic.</p>';
          } else {
            html +=
              '<ul class="list-unstyled mb-0 d-flex flex-wrap admin-kw-tag-list align-items-center">';
            list.forEach(function (item) {
              html +=
                '<li class="m-0"><span class="admin-kw-tag-pill">' +
                escapeHtml(item.tag || "") +
                "</span></li>";
            });
            html += "</ul>";
          }
          html += "</section>";
        });
        out.innerHTML = html;
      }

      panel.querySelectorAll(".js-admin-kw-topic").forEach(function (cb) {
        cb.addEventListener("change", renderAdminKwTags);
      });
      var kwSelAll = document.getElementById("adminKwTopicSelectAll");
      var kwClrAll = document.getElementById("adminKwTopicClearAll");
      if (kwSelAll) {
        kwSelAll.addEventListener("click", function () {
          panel.querySelectorAll(".js-admin-kw-topic").forEach(function (cb) {
            cb.checked = true;
          });
          renderAdminKwTags();
        });
      }
      if (kwClrAll) {
        kwClrAll.addEventListener("click", function () {
          panel.querySelectorAll(".js-admin-kw-topic").forEach(function (cb) {
            cb.checked = false;
          });
          renderAdminKwTags();
        });
      }
      renderAdminKwTags();

      var suggestBtn = document.getElementById("adminKwSuggestBtn");
      var suggestSpin = document.getElementById("adminKwSuggestSpinner");
      var suggestModalEl = document.getElementById("adminKwSuggestModal");
      var suggestBody = document.getElementById("adminKwSuggestModalBody");
      var KW_SUGGEST_URL = {{ url_for('main.admin_keywords_suggest') | tojson }};
      var KW_MAINT_URL = {{ url_for('main.keyword_maintenance', tab='keywords') | tojson }};
      var KW_APPLY_URL = {{ url_for('main.admin_keywords_apply_suggestions') | tojson }};

      function adminKeywordSuggestMsg(title, message) {
        if (window.showTnwMessage) {
          window.showTnwMessage(message || "", { title: title || "Notice" });
          return;
        }
        var lab = document.getElementById("adminToolbarMsgModalLabel");
        var body = document.getElementById("adminToolbarMsgModalBody");
        var el = document.getElementById("adminToolbarMsgModal");
        if (!lab || !body || !el || !window.bootstrap || !window.bootstrap.Modal) return;
        lab.textContent = title || "Notice";
        body.textContent = message || "";
        window.bootstrap.Modal.getOrCreateInstance(el).show();
      }

      function updateKwSuggestCount(root) {
        if (!root) return;
        var na = root.querySelectorAll(".js-admin-kw-suggest-add-cb:checked").length;
        var nr = root.querySelectorAll(".js-admin-kw-suggest-rem-cb:checked").length;
        var nl = root.querySelectorAll(".js-admin-kw-suggest-link-cb:checked").length;
        var el = root.querySelector("#adminKwSugSelCount");
        if (el) {
          el.textContent =
            na +
            " add" +
            (na !== 1 ? "s" : "") +
            ", " +
            nr +
            " remove" +
            (nr !== 1 ? "s" : "") +
            ", " +
            nl +
            " group link" +
            (nl !== 1 ? "s" : "") +
            " selected";
        }
        var cpy = root.querySelector("#adminKwSuggestCopySelected");
        if (cpy) cpy.disabled = na + nr + nl === 0;
        var apy = root.querySelector("#adminKwSuggestApplySelected");
        if (apy) apy.disabled = na + nr + nl === 0;
      }

      function collectKwSuggestPayload(root) {
        var adds = [];
        var removes = [];
        var group_links = [];
        if (!root) return { adds: adds, removes: removes, group_links: group_links };
        root.querySelectorAll(".js-admin-kw-suggest-add-cb:checked").forEach(function (c) {
          var iid = parseInt(c.getAttribute("data-industry-id"), 10);
          var tag = (c.getAttribute("data-tag") || "").trim();
          if (!isNaN(iid) && tag) adds.push({ industry_id: iid, tag: tag });
        });
        root.querySelectorAll(".js-admin-kw-suggest-rem-cb:checked").forEach(function (c) {
          var tid = parseInt(c.getAttribute("data-tag-id"), 10);
          var tlab = (c.getAttribute("data-tag") || "").trim();
          if (!isNaN(tid)) removes.push({ tag_id: tid, tag: tlab });
        });
        root.querySelectorAll(".js-admin-kw-suggest-link-cb:checked").forEach(function (c) {
          var mid = parseInt(c.getAttribute("data-mg-id"), 10);
          var tid = parseInt(c.getAttribute("data-tag-id"), 10);
          if (!isNaN(mid) && !isNaN(tid)) {
            group_links.push({ meeting_group_id: mid, tag_id: tid });
          }
        });
        return { adds: adds, removes: removes, group_links: group_links };
      }

      var pendingKwApplyPayload = null;

      function adminKwSuggestCopyFromRoot(root) {
        if (!root) return;
        var lines = [];
        var addChecked = root.querySelectorAll(".js-admin-kw-suggest-add-cb:checked");
        var remChecked = root.querySelectorAll(".js-admin-kw-suggest-rem-cb:checked");
        var linkChecked = root.querySelectorAll(".js-admin-kw-suggest-link-cb:checked");
        if (!addChecked.length && !remChecked.length && !linkChecked.length) return;
        if (linkChecked.length) {
          lines.push("Attach existing keyword to event group (meeting_group_id → tag_id):");
          linkChecked.forEach(function (c) {
            lines.push(
              "- Group " +
                (c.getAttribute("data-mg-id") || "") +
                " (" +
                (c.getAttribute("data-mg-name") || "") +
                ") → " +
                (c.getAttribute("data-tag") || "") +
                " (tag_id " +
                (c.getAttribute("data-tag-id") || "") +
                ")"
            );
          });
          lines.push("");
        }
        if (addChecked.length) {
          lines.push("Suggested additions (topic → tag, industry_id):");
          addChecked.forEach(function (c) {
            lines.push(
              "- " +
                (c.getAttribute("data-topic") || "") +
                " → " +
                (c.getAttribute("data-tag") || "") +
                " (industry_id " +
                (c.getAttribute("data-industry-id") || "") +
                ")"
            );
          });
          lines.push("");
        }
        if (remChecked.length) {
          lines.push("Suggested removals (tag_id — use keyword maintenance to delete):");
          remChecked.forEach(function (c) {
            lines.push(
              "- " +
                (c.getAttribute("data-tag") || "") +
                " (tag_id " +
                (c.getAttribute("data-tag-id") || "") +
                ")" +
                (c.getAttribute("data-topic") ? " — " + c.getAttribute("data-topic") : "")
            );
          });
        }
        var text = lines.join("\n");
        function copiedMsg() {
          if (window.showTnwMessage) {
            window.showTnwMessage("Selection copied to the clipboard.", { title: "Copied" });
          } else {
            adminKeywordSuggestMsg("Copied", "Selection copied to the clipboard.");
          }
        }
        function fallbackCopy() {
          var ta = document.createElement("textarea");
          ta.value = text;
          ta.setAttribute("readonly", "");
          ta.style.position = "fixed";
          ta.style.left = "-9999px";
          document.body.appendChild(ta);
          ta.select();
          try {
            document.execCommand("copy");
            copiedMsg();
          } catch (e) {
            adminKeywordSuggestMsg("Copy failed", "Your browser blocked clipboard access.");
          }
          document.body.removeChild(ta);
        }
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).then(copiedMsg).catch(fallbackCopy);
        } else {
          fallbackCopy();
        }
      }

      var adminKwSuggestDelegationBound = false;
      function ensureKwSuggestDelegation() {
        if (adminKwSuggestDelegationBound || !suggestBody) return;
        adminKwSuggestDelegationBound = true;
        suggestBody.addEventListener("click", function (ev) {
          var btn = ev.target.closest ? ev.target.closest("button") : null;
          if (!btn || !suggestBody.contains(btn)) return;
          if (btn.id === "adminKwSugSelAllAdd") {
            suggestBody.querySelectorAll(".js-admin-kw-suggest-add-cb").forEach(function (c) {
              c.checked = true;
            });
            updateKwSuggestCount(suggestBody);
          } else if (btn.id === "adminKwSugClrAdd") {
            suggestBody.querySelectorAll(".js-admin-kw-suggest-add-cb").forEach(function (c) {
              c.checked = false;
            });
            updateKwSuggestCount(suggestBody);
          } else if (btn.id === "adminKwSugSelAllRem") {
            suggestBody.querySelectorAll(".js-admin-kw-suggest-rem-cb").forEach(function (c) {
              c.checked = true;
            });
            updateKwSuggestCount(suggestBody);
          } else if (btn.id === "adminKwSugClrRem") {
            suggestBody.querySelectorAll(".js-admin-kw-suggest-rem-cb").forEach(function (c) {
              c.checked = false;
            });
            updateKwSuggestCount(suggestBody);
          } else if (btn.id === "adminKwSugSelAllLink") {
            suggestBody.querySelectorAll(".js-admin-kw-suggest-link-cb").forEach(function (c) {
              c.checked = true;
            });
            updateKwSuggestCount(suggestBody);
          } else if (btn.id === "adminKwSugClrLink") {
            suggestBody.querySelectorAll(".js-admin-kw-suggest-link-cb").forEach(function (c) {
              c.checked = false;
            });
            updateKwSuggestCount(suggestBody);
          } else if (btn.id === "adminKwSuggestCopySelected") {
            adminKwSuggestCopyFromRoot(suggestBody);
          } else if (btn.id === "adminKwSuggestApplySelected") {
            var payload = collectKwSuggestPayload(suggestBody);
            if (!payload.adds.length && !payload.removes.length && !payload.group_links.length) return;
            pendingKwApplyPayload = payload;
            var cbody = document.getElementById("adminKwSuggestApplyConfirmBody");
            var cmodal = document.getElementById("adminKwSuggestApplyConfirmModal");
            if (!cbody || !cmodal || !window.bootstrap || !window.bootstrap.Modal) return;
            var lines = [];
            lines.push(
              "<p class=\"mb-2\">The following changes will be written to the database.</p><ul class=\"small mb-3\">"
            );
            payload.adds.forEach(function (a) {
              lines.push(
                "<li>Add keyword <strong>" +
                  escapeHtml(a.tag) +
                  "</strong> under topic (industry) id <strong>" +
                  escapeHtml(String(a.industry_id)) +
                  "</strong></li>"
              );
            });
            payload.removes.forEach(function (r) {
              var nm = (r.tag && String(r.tag).trim()) ? escapeHtml(r.tag) : "tag id " + escapeHtml(String(r.tag_id));
              lines.push(
                "<li>Delete keyword <strong>" +
                  nm +
                  "</strong> (only if it is not linked to any profile or event group)</li>"
              );
            });
            (payload.group_links || []).forEach(function (lnk) {
              lines.push(
                "<li>Attach existing tag id <strong>" +
                  escapeHtml(String(lnk.tag_id)) +
                  "</strong> to event group id <strong>" +
                  escapeHtml(String(lnk.meeting_group_id)) +
                  "</strong> (topic must match)</li>"
              );
            });
            lines.push("</ul>");
            lines.push(
              "<p class=\"small text-danger mb-0\">Removals cannot be undone. Any remove that is still in use will be skipped and reported after you confirm.</p>"
            );
            cbody.innerHTML = lines.join("");
            window.bootstrap.Modal.getOrCreateInstance(cmodal).show();
          }
        });
        suggestBody.addEventListener("change", function (ev) {
          var t = ev.target;
          if (!t || !t.classList) return;
          if (
            t.classList.contains("js-admin-kw-suggest-add-cb") ||
            t.classList.contains("js-admin-kw-suggest-rem-cb") ||
            t.classList.contains("js-admin-kw-suggest-link-cb")
          ) {
            updateKwSuggestCount(suggestBody);
          }
        });
      }

      function renderSuggestBody(data) {
        if (!suggestBody) return;
        var html = "";
        if (data.meta) {
          var m = data.meta;
          html +=
            '<p class="small admin-console-footer-note mb-3">Analysed <strong>' +
            String(m.groups_included) +
            "</strong> of <strong>" +
            String(m.groups_total) +
            "</strong> event groups";
          if (m.truncated) {
            html +=
              " (corpus size limit; some groups were omitted from the text sent to the model).";
          }
          html += "</p>";
        }
        var adds = data.suggested_add || [];
        var rems = data.suggested_remove || [];
        var links = data.suggested_group_tag_links || [];
        var kwBothEmpty = !adds.length && !rems.length && !links.length;
        if (kwBothEmpty) {
          html +=
            '<div class="alert alert-warning border border-warning border-opacity-50 small mb-3" role="status">' +
            "<strong>No suggestions to show.</strong> ";
          html +=
            "The AI call finished, but nothing passed validation for new keywords, removals, or group links. ";
          html +=
            "The model should return link_existing_tags (existing tag_id → meeting_group_id), suggested_add, ";
          html +=
            "and optional suggested_remove. ";
          html += "<strong>Check the server terminal</strong> for lines starting with ";
          html += "<code class=\"user-select-all\">[admin_keywords_suggest]</code>.";
          html += "</div>";
        }
        if (data.notes) {
          html +=
            '<div class="' +
            (kwBothEmpty ? "mb-3" : "small mb-3") +
            '"><p class="small mb-0 text-break">' +
            escapeHtml(data.notes).replace(/\n/g, "<br>") +
            "</p></div>";
        } else if (kwBothEmpty) {
          html +=
            '<p class="small text-muted mb-3">If the problem persists, confirm GEMINI_API_KEY and GEMINI_MODEL in the server environment.</p>';
        }
        html += '<div class="row g-3">';
        html +=
          '<div class="col-md-6"><h3 class="h6 text-uppercase admin-console-footer-note mb-2">Suggest adding</h3>';
        var addIdx = 0;
        if (!adds.length) {
          html +=
            '<p class="small mb-0 admin-console-footer-note">No additions to list (model returned none or all were filtered).</p>';
        } else {
          var byTopic = {};
          adds.forEach(function (a) {
            var key = ((a.topic || "Suggested tags") + "").trim() || "Suggested tags";
            if (!byTopic[key]) byTopic[key] = [];
            byTopic[key].push(a);
          });
          var topicNames = Object.keys(byTopic).sort(function (a, b) {
            return a.localeCompare(b, undefined, { sensitivity: "base" });
          });
          html += '<div class="small">';
          topicNames.forEach(function (tn) {
            html +=
              '<section class="mb-3 pb-2 border-bottom border-secondary border-opacity-25">';
            html += '<h4 class="h6 mb-2 admin-kw-suggest-topic-title">' + escapeHtml(tn) + "</h4>";
            html += '<ul class="list-unstyled mb-0 admin-kw-suggest-list">';
            byTopic[tn].forEach(function (a) {
              var cid = "adminKwSugAdd-" + addIdx;
              var iid = String(a.industry_id != null ? a.industry_id : "");
              var ttag = String(a.tag || "");
              var ttopic = String(a.topic || tn || "");
              html += '<li class="border-bottom border-secondary border-opacity-25 admin-kw-suggest-row">';
              html +=
                '<input type="checkbox" class="form-check-input js-admin-kw-suggest-add-cb" id="' +
                cid +
                '" data-industry-id="' +
                escapeAttr(iid) +
                '" data-tag="' +
                escapeAttr(ttag) +
                '" data-topic="' +
                escapeAttr(ttopic) +
                '">';
              html += '<label class="admin-kw-suggest-row-label mb-0" for="' + cid + '">';
              html +=
                '<span class="admin-kw-suggest-pill admin-kw-suggest-pill--add me-1">' +
                escapeHtml(ttag) +
                "</span>";
              if (a.reason) {
                html +=
                  '<div class="admin-kw-suggest-reason">' + escapeHtml(a.reason) + "</div>";
              }
              if (a.example_group_ids && a.example_group_ids.length) {
                html +=
                  '<div class="admin-kw-suggest-meta">Example group IDs: ' +
                  escapeHtml(a.example_group_ids.join(", ")) +
                  "</div>";
              }
              html += "</label></li>";
              addIdx += 1;
            });
            html += "</ul></section>";
          });
          html += "</div>";
        }
        html += "</div>";
        html +=
          '<div class="col-md-6"><h3 class="h6 text-uppercase admin-console-footer-note mb-2">Suggest removing</h3>';
        var remIdx = 0;
        if (!rems.length) {
          html +=
            '<p class="small mb-0 admin-console-footer-note">No removals to list (model returned none or tag IDs did not match).</p>';
        } else {
          html += '<ul class="list-unstyled mb-0 admin-kw-suggest-list">';
          rems.forEach(function (r) {
            var rid = "adminKwSugRem-" + remIdx;
            var tid = String(r.tag_id != null ? r.tag_id : "");
            var rtag = String(r.tag || "");
            var rtopic = String(r.topic || "");
            html += '<li class="border-bottom border-secondary border-opacity-25 admin-kw-suggest-row">';
            html +=
              '<input type="checkbox" class="form-check-input js-admin-kw-suggest-rem-cb" id="' +
              rid +
              '" data-tag-id="' +
              escapeAttr(tid) +
              '" data-tag="' +
              escapeAttr(rtag) +
              '" data-topic="' +
              escapeAttr(rtopic) +
              '">';
            html += '<label class="admin-kw-suggest-row-label mb-0" for="' + rid + '">';
            html +=
              '<span class="admin-kw-suggest-pill admin-kw-suggest-pill--remove me-1">' +
              escapeHtml(rtag) +
              "</span>";
            html +=
              ' <span class="admin-kw-suggest-meta">id ' +
              escapeHtml(tid) +
              "</span>";
            if (r.topic) {
              html += ' <span class="admin-kw-suggest-meta">' + escapeHtml(r.topic) + "</span>";
            }
            if (r.reason) {
              html +=
                '<div class="admin-kw-suggest-reason">' + escapeHtml(r.reason) + "</div>";
            }
            html += "</label></li>";
            remIdx += 1;
          });
          html += "</ul>";
        }
        html += "</div>";
        html +=
          '<div class="col-12 mt-1"><h3 class="h6 text-uppercase admin-console-footer-note mb-2">Attach existing keywords to event groups</h3>';
        var linkIdx = 0;
        if (!links.length) {
          html +=
            '<p class="small mb-0 admin-console-footer-note">No link suggestions (model did not return link_existing_tags, or every row failed validation — e.g. wrong topic or already on the group).</p>';
        } else {
          html += '<ul class="list-unstyled mb-0 admin-kw-suggest-list small">';
          links.forEach(function (lnk) {
            var lid = "adminKwSugLink-" + linkIdx;
            var mid = String(lnk.meeting_group_id != null ? lnk.meeting_group_id : "");
            var tid = String(lnk.tag_id != null ? lnk.tag_id : "");
            var gnm = String(lnk.meeting_group_name || "");
            var tnm = String(lnk.tag || "");
            var top = String(lnk.topic || "");
            html += '<li class="border-bottom border-secondary border-opacity-25 admin-kw-suggest-row">';
            html +=
              '<input type="checkbox" class="form-check-input js-admin-kw-suggest-link-cb" id="' +
              lid +
              '" data-mg-id="' +
              escapeAttr(mid) +
              '" data-tag-id="' +
              escapeAttr(tid) +
              '" data-mg-name="' +
              escapeAttr(gnm) +
              '" data-tag="' +
              escapeAttr(tnm) +
              '" data-topic="' +
              escapeAttr(top) +
              '">';
            html += '<label class="admin-kw-suggest-row-label mb-0" for="' + lid + '">';
            html +=
              '<span class="admin-kw-suggest-pill admin-kw-suggest-pill--add me-1">' +
              escapeHtml(tnm) +
              "</span>";
            html +=
              ' <span class="admin-kw-suggest-meta">→ group ' +
              escapeHtml(mid) +
              (gnm ? " · " + escapeHtml(gnm) : "") +
              "</span>";
            if (top) {
              html += ' <span class="admin-kw-suggest-meta">' + escapeHtml(top) + "</span>";
            }
            if (lnk.reason) {
              html += '<div class="admin-kw-suggest-reason">' + escapeHtml(lnk.reason) + "</div>";
            }
            html += "</label></li>";
            linkIdx += 1;
          });
          html += "</ul>";
        }
        html += "</div></div>";
        if (adds.length || rems.length || links.length) {
          html +=
            '<div class="admin-kw-suggest-toolbar mb-3 pb-3 border-bottom border-secondary border-opacity-25">' +
            '<div class="d-flex flex-wrap align-items-center gap-2">' +
            '<span class="small fw-semibold text-nowrap me-1">Selection</span>' +
            '<button type="button" class="btn btn-sm btn-outline-primary" id="adminKwSugSelAllAdd">Select all adds</button>' +
            '<button type="button" class="btn btn-sm btn-outline-primary" id="adminKwSugClrAdd">Clear adds</button>' +
            '<button type="button" class="btn btn-sm btn-outline-primary" id="adminKwSugSelAllRem">Select all removes</button>' +
            '<button type="button" class="btn btn-sm btn-outline-primary" id="adminKwSugClrRem">Clear removes</button>' +
            '<button type="button" class="btn btn-sm btn-outline-primary" id="adminKwSugSelAllLink">Select all group links</button>' +
            '<button type="button" class="btn btn-sm btn-outline-primary" id="adminKwSugClrLink">Clear group links</button>' +
